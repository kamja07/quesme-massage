<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe Massage · 샵 등록 신청</title>
<link rel="stylesheet" href="app.css">
<style>
  .reg{max-width:480px; margin:0 auto; min-height:100%; background:#fff;}
  .reg-top{background:var(--teal); color:#fff; padding:18px;}
  .reg-top .t1{font-size:19px; font-weight:800;} .reg-top .t2{font-size:12.5px; opacity:.9;}
  .reg-body{padding:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px; font-weight:700;}
  .field input{width:100%; padding:12px; border:1.5px solid #d7e2df; border-radius:11px; font-size:15px; font-family:inherit; color:var(--ink);}
  .field input:focus{outline:none; border-color:var(--teal);}
  .field .hint{font-size:11.5px; color:#9aa7a4; margin-top:5px;}
  .done{text-align:center; padding:40px 16px;} .done .ic{font-size:46px;} .done h3{color:var(--teal); margin:10px 0 6px;} .done p{color:var(--muted); font-size:14px; line-height:1.6;}
  .err{color:var(--warm); font-size:13px; margin-top:8px; text-align:center; min-height:1px;}
  a.back{display:inline-block; margin-top:18px; color:var(--teal); font-size:13px; text-decoration:none;}
</style>
</head>
<body>
<div class="reg">
  <div class="reg-top"><div class="t1">마사지샵 등록 신청</div><div class="t2">QuesMe Massage로 예약·출장·마사지사 관리를 한 번에</div></div>
  <div class="reg-body" id="body"></div>
</div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var body=document.getElementById('body');
  function form(){
    body.innerHTML =
      '<div class="field"><label>샵 이름 *</label><input id="f_name" placeholder="예: 사바이 타이마사지 텅러"></div>'+
      '<div class="field"><label>지역(동네)</label><input id="f_area" placeholder="예: 텅러, 아속, 수쿰빗"></div>'+
      '<div class="field"><label>희망 샵코드 (영문, QR·주소에 쓰임) *</label><input id="f_slug" placeholder="예: sabai-thonglor" autocapitalize="off"><div class="hint">소문자·영문·하이픈. 손님이 ?store=코드 로 들어와요.</div></div>'+
      '<div class="field"><label>사장님 로그인 아이디 *</label><input id="f_login" placeholder="예: somchai" autocapitalize="off"><div class="hint">이 아이디로 샵 콘솔에 로그인하게 됩니다.</div></div>'+
      '<div class="field"><label>연락처 (전화/이메일/LINE)</label><input id="f_contact" placeholder="010-... 또는 LINE id"></div>'+
      '<button class="bigbtn" id="submit" onclick="submitReq()">신청하기</button>'+
      '<div class="err" id="err"></div>'+
      '<a class="back" href="home.html">← 둘러보기로</a>';
  }
  window.submitReq=function(){
    var name=(document.getElementById('f_name').value||'').trim();
    var slug=(document.getElementById('f_slug').value||'').trim().toLowerCase();
    var login=(document.getElementById('f_login').value||'').trim().toLowerCase();
    var err=document.getElementById('err'); err.textContent='';
    if(!name||!slug||!login){ err.textContent='샵 이름·샵코드·사장님 아이디는 필수예요.'; return; }
    document.getElementById('submit').disabled=true;
    supa.from('qsm_shop_requests').insert({ name:name, area:(document.getElementById('f_area').value||'').trim(), desired_slug:slug, owner_login:login, contact:(document.getElementById('f_contact').value||'').trim(), status:'pending' }).then(function(res){
      if(res&&res.error){ err.textContent='신청 실패 — 잠시 후 다시'; document.getElementById('submit').disabled=false; return; }
      body.innerHTML='<div class="done"><div class="ic">📨</div><h3>신청이 접수됐어요</h3><p><b>'+name+'</b> ('+slug+')<br>검토 후 승인되면 샵 콘솔을 쓸 수 있어요.<br>사장님 아이디 <b>'+login+'</b>로 로그인하게 됩니다.</p><a class="back" href="home.html">← 둘러보기로</a></div>';
    }).catch(function(){ err.textContent='신청 실패 — 잠시 후 다시'; document.getElementById('submit').disabled=false; });
  };
  form();
})();
</script>
</body>
</html>
