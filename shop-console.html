<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16323A">
<script src="inapp.js"></script>
<title>QuesMe Massage · 샵 콘솔</title>
<link rel="stylesheet" href="app.css">
<style>
  .sc{max-width:680px; margin:0 auto; min-height:100%; background:#fff;}
  .sc-top{background:var(--ink); color:#fff; padding:13px 18px; display:flex; align-items:center; justify-content:space-between;}
  .sc-top .t1{font-size:16px; font-weight:800;} .sc-top .t2{font-size:11px; opacity:.8;}
  .logoutbtn{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700;}
  .tabs{display:flex; border-bottom:1px solid #eef3f1; position:sticky; top:0; background:#fff; z-index:4;}
  .tab{flex:1; padding:13px 6px; text-align:center; font-size:13px; font-weight:700; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer;}
  .tab.on{color:var(--teal); border-bottom-color:var(--teal);}
  .body{padding:14px 16px 30px;}
  .row{display:flex; align-items:center; gap:11px; padding:12px; border:1px solid #eef3f1; border-radius:13px; margin-bottom:9px;}
  .row.off{opacity:.5;}
  .row .av{width:40px;height:40px;flex:0 0 40px;border-radius:50%;background:var(--teal-l);color:var(--teal);font-weight:800;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .row .av img{width:100%;height:100%;object-fit:cover;}
  .row .av.pretty{box-shadow:0 0 0 2px #e6b800;}
  .row .mid{flex:1;min-width:0;} .row .nm{font-size:15px;font-weight:800;} .row .meta{font-size:12px;color:var(--muted);margin-top:1px;}
  .row .acts{display:flex;gap:5px;}
  .ibtn{background:#eef3f1;border:none;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:#3c4a4d;cursor:pointer;}
  .ibtn.warn{background:#fdecea;color:var(--warm);}
  .tag{font-size:10px;font-weight:800;padding:2px 6px;border-radius:20px;margin-left:4px;}
  .tag.pretty{background:#fff3cd;color:#9a6a00;} .tag.regular{background:#eef3f1;color:#5f6f6c;} .tag.free{background:#e6f1fb;color:#185fa5;} .tag.out{background:var(--teal-l);color:var(--teal);}
  .addbox{border:1.5px dashed #d7e2df; border-radius:13px; padding:13px; margin-bottom:14px;}
  .addbox .ttl{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:9px;}
  .addbox input, .addbox select{width:100%; padding:10px; border:1.5px solid #d7e2df; border-radius:9px; font-size:14px; font-family:inherit; margin-bottom:8px;}
  .addbox .two{display:flex; gap:8px;} .addbox .two>*{flex:1;}
  .chk{display:flex; gap:14px; margin-bottom:9px; font-size:13px; color:var(--ink);}
  .chk label{display:flex; align-items:center; gap:5px;}
  .empty{text-align:center; color:#9aa7a4; padding:24px; font-size:13px;}
  .bk{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid #eef3f1;border-radius:13px;margin-bottom:9px;}
  .bk.serving{border-color:var(--warm);background:var(--warm-l);}
  .bk .tm{flex:0 0 50px;text-align:center;} .bk .tm .h{font-size:14px;font-weight:800;color:var(--teal);}
  .bk .mid{flex:1;min-width:0;} .bk .nick{font-size:14px;font-weight:800;} .bk .meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .loginwrap{position:fixed;inset:0;background:#0c1a1f;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .logincard{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:360px;}
  .loginh{text-align:center;font-size:20px;font-weight:800;color:var(--teal);}
  .logint{text-align:center;font-size:14px;color:var(--muted);margin:4px 0 18px;font-weight:700;}
  .logincard input{width:100%;padding:13px;border:1.5px solid #d7e2df;border-radius:11px;font-size:15px;font-family:inherit;margin-bottom:10px;}
  .loginErr{color:var(--warm);font-size:13px;text-align:center;margin-top:10px;min-height:1px;}
  /* 마사지사 편집 모달 */
  .pmwrap{position:fixed; inset:0; z-index:1100; background:rgba(8,18,22,.72); display:none; align-items:flex-end; justify-content:center;}
  .pmwrap.on{display:flex;}
  .pmodal{background:#fff; border-radius:18px 18px 0 0; width:100%; max-width:680px; max-height:90vh; overflow:auto; padding:18px 18px calc(20px + env(safe-area-inset-bottom));}
  .pmh{display:flex; align-items:center; margin-bottom:14px;}
  .pmh .t{font-size:16px; font-weight:800; color:var(--ink);} .pmh .x{margin-left:auto; background:#eef3f1; border:none; border-radius:50%; width:30px; height:30px; font-size:16px; cursor:pointer;}
  .pmodal label{display:block; font-size:12px; color:var(--muted); font-weight:700; margin:10px 0 5px;}
  .pmodal input, .pmodal select{width:100%; padding:11px; border:1.5px solid #d7e2df; border-radius:10px; font-size:14px; font-family:inherit;}
  .pmodal .two{display:flex; gap:8px;} .pmodal .two>div{flex:1;}
  .pmodal .chk{display:flex; gap:16px; margin-top:12px; font-size:14px;} .pmodal .chk label{margin:0; display:flex; align-items:center; gap:6px;}
  .photos{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .photo{position:relative; width:72px; height:90px; border-radius:10px; overflow:hidden; background:#eef3f1;}
  .photo img{width:100%; height:100%; object-fit:cover;}
  .photo .pr{position:absolute; top:2px; right:2px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; line-height:1;}
  .photo.main::after{content:'대표'; position:absolute; bottom:0; left:0; right:0; background:rgba(14,122,95,.85); color:#fff; font-size:9px; font-weight:800; text-align:center; padding:1px;}
  .addphoto{width:72px; height:90px; border:1.5px dashed #c7d3cf; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; color:#9aa7a4; cursor:pointer;}
  .pmsave{position:sticky; bottom:0; background:#fff; margin:16px -18px 0; padding:12px 18px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid #eef3f1; box-shadow:0 -5px 14px rgba(0,0,0,.05);}
  .pmsave .bigbtn{margin:0;}
  /* 스케줄 그리드 */
  .schtop{display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap;}
  .schtop input[type=date]{padding:8px; border:1.5px solid #d7e2df; border-radius:9px; font-family:inherit; font-size:14px;}
  .daynav{background:#eef3f1; border:none; border-radius:8px; width:34px; height:34px; font-size:16px; cursor:pointer;}
  .vtog{display:flex; border:1.5px solid #d7e2df; border-radius:9px; overflow:hidden; margin-left:auto;}
  .vtog button{padding:8px 12px; border:none; background:#fff; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer;}
  .vtog button.on{background:var(--teal); color:#fff;}
  .hrset{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); width:100%;}
  .hrset input{width:62px; padding:6px; border:1px solid #d7e2df; border-radius:7px; font-family:inherit; font-size:12px;}
  .gwrap{overflow:auto; max-height:70vh; border:1px solid #eef3f1; border-radius:12px;}
  .gtable{border-collapse:separate; border-spacing:0;}
  .gtable td,.gtable th{border-right:1px solid #f0f3f2; border-bottom:1px solid #f0f3f2;}
  .rowhead{position:sticky; left:0; background:#fbfdfc; z-index:2; min-width:92px; max-width:92px; padding:6px 9px; font-size:12.5px; font-weight:700; text-align:left;}
  .timehead{font-size:10px; color:var(--muted); font-weight:700; padding:5px 0; min-width:48px; background:#fbfdfc; position:sticky; top:0; z-index:1;}
  .corner{position:sticky; left:0; top:0; z-index:3; background:#fbfdfc;}
  .gcell{min-width:48px; height:42px; cursor:pointer; padding:0;}
  .gcell:hover{background:var(--teal-l);}
  .gcell.off{background:repeating-linear-gradient(45deg,#f5f5f3,#f5f5f3 5px,#ececea 5px,#ececea 10px); cursor:default;}
  .gbk{height:40px; border-radius:7px; margin:1px; padding:3px 6px; font-size:10.5px; line-height:1.2; overflow:hidden; cursor:pointer; color:#fff; background:var(--teal);}
  .gbk.pretty{background:#c79100;} .gbk.serving{background:var(--warm);} .gbk.done{background:#9aa7a4;}
  .gbk b{font-weight:800;}
  .slotinfo{font-size:13px; color:var(--muted); margin:-4px 0 12px;}
</style>
</head>
<body>
<div class="loginwrap" id="loginwrap">
  <div class="logincard"><div class="loginh">QuesMe Massage</div><div class="logint">샵 콘솔 로그인</div>
    <input id="liId" placeholder="아이디 (샵에서 발급)" autocapitalize="off">
    <input id="liPw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="bigbtn" onclick="doLogin()">로그인</button><div class="loginErr" id="liErr"></div>
    <div style="text-align:center;font-size:12.5px;color:#9aa7a4;margin-top:14px"><a style="color:var(--teal);font-weight:700;cursor:pointer" onclick="doSignup()">처음이면 비밀번호 설정 →</a></div></div>
</div>
<div class="sc">
  <div class="sc-top"><div><div class="t1" id="shopName">샵 콘솔</div><div class="t2" id="sub"></div></div><button class="logoutbtn" onclick="doLogout()">로그아웃</button></div>
  <div class="tabs">
    <div class="tab on" data-t="schedule" onclick="setTab('schedule')">📅 스케줄</div>
    <div class="tab" data-t="bookings" onclick="setTab('bookings')">🗓 예약</div>
    <div class="tab" data-t="pay" onclick="setTab('pay')">💵 입금</div>
    <div class="tab" data-t="penalty" onclick="setTab('penalty')">⚠️ 벌금</div>
    <div class="tab" data-t="providers" onclick="setTab('providers')">💆 마사지사</div>
    <div class="tab" data-t="rooms" onclick="setTab('rooms')">🚪 룸</div>
    <div class="tab" data-t="services" onclick="setTab('services')">📋 시술</div>
  </div>
  <div class="body" id="body"></div>
</div>
<div class="pmwrap" id="pmwrap" onclick="if(event.target===this)closeEdit()"><div class="pmodal" id="pmodal"></div></div>
<div class="pmwrap" id="smwrap" onclick="if(event.target===this)closeSlot()"><div class="pmodal" id="smodal"></div></div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var slug = new URLSearchParams(location.search).get('store') || '';
  var tab='schedule', providers=[], rooms=[], services=[], bookings=[], shop=null, penalties=[];
  var schedView='room', schedDate, schedBookings=[], schedShifts={};
  function today(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  schedDate=today();
  function hm2min(s){ var p=(s||'').split(':'); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
  function min2hm(m){ m=((m%1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  function schSlots(){ var o=hm2min((shop&&shop.open_time)||'10:00'), c=hm2min((shop&&shop.close_time)||'22:00'); if(c<=o)c=o+12*60; var a=[]; for(var t=o;t<c;t+=30)a.push(t); return a; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
  function byId(a,id){ for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }

  function emailOf(){ var id=(document.getElementById('liId').value||'').trim().toLowerCase(); return id.indexOf('@')<0?id+'@thaimate.app':id; }
  window.doLogin=function(){ document.getElementById('liErr').textContent='';
    supa.auth.signInWithPassword({email:emailOf(),password:document.getElementById('liPw').value||''}).then(function(r){ if(r&&r.error) document.getElementById('liErr').textContent='로그인 실패 — 처음이면 아래 "비밀번호 설정"'; }); };
  window.doSignup=function(){ var pw=document.getElementById('liPw').value||''; document.getElementById('liErr').textContent=''; if(pw.length<6){ document.getElementById('liErr').textContent='비밀번호 6자 이상'; return; }
    supa.auth.signUp({email:emailOf(),password:pw}).then(function(r){ if(r&&r.error) document.getElementById('liErr').textContent='설정 실패 — '+(r.error.message||''); }); };
  window.doLogout=function(){ supa.auth.signOut(); };
  window.setTab=function(t){ tab=t; Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(e){ e.classList.toggle('on', e.getAttribute('data-t')===t); }); if(t==='schedule') loadSched(); else render(); };

  function load(){
    Promise.all([
      supa.from('qsm_shops').select('*').eq('slug',slug).maybeSingle(),
      supa.from('qsm_providers').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_rooms').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_services').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_bookings').select('*').eq('store_slug',slug).eq('book_date',today()).neq('status','cancelled').neq('status','done'),
      supa.from('qsm_penalties').select('*').eq('store_slug',slug).order('work_date',{ascending:false})
    ]).then(function(r){ shop=r[0].data; providers=r[1].data||[]; rooms=r[2].data||[]; services=r[3].data||[]; bookings=r[4].data||[]; penalties=r[5].data||[];
      document.getElementById('shopName').textContent=(shop&&((shop.names||{}).ko||(shop.names||{}).en))||slug;
      document.getElementById('sub').textContent='QuesMe Massage · '+slug; if(tab==='schedule') loadSched(); else render(); });
  }

  // ---- 스케줄 그리드 ----
  function loadSched(){
    Promise.all([
      supa.from('qsm_bookings').select('*').eq('store_slug',slug).eq('book_date',schedDate).neq('status','cancelled'),
      supa.from('qsm_shifts').select('*').eq('store_slug',slug).eq('work_date',schedDate)
    ]).then(function(r){ schedBookings=r[0].data||[]; schedShifts={}; (r[1].data||[]).forEach(function(s){ schedShifts[s.provider_id]=s; }); renderSched(); });
  }
  window.setSchedView=function(v){ schedView=v; renderSched(); };
  window.changeDate=function(d){ var dt=new Date(schedDate+'T00:00:00'); dt.setDate(dt.getDate()+d); schedDate=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); loadSched(); };
  window.setDate=function(v){ if(v){ schedDate=v; loadSched(); } };
  window.setHours=function(){ var o=v('h_open'), c=v('h_close'); supa.from('qsm_shops').update({open_time:o,close_time:c}).eq('slug',slug).then(function(){ if(shop){shop.open_time=o;shop.close_time=c;} renderSched(); }); };
  function slotIdx(slots,t){ var best=-1; for(var i=0;i<slots.length;i++){ if(slots[i]<=t) best=i; } return best; }
  function offShiftAt(prov,t){   // 근무 디폴트 · 전일휴무(off) · 비근무 시간대(off_slots)
    var s=schedShifts[prov.id];
    if(!s) return false;         // 출근표 없음 = 근무
    if(s.off) return true;       // 전일 휴무
    var blk=s.off_slots||[]; for(var i=0;i<blk.length;i++){ if(t>=hm2min(blk[i].s) && t<hm2min(blk[i].e)) return true; }
    return false;
  }

  function renderSched(){
    var slots=schSlots();
    var rowsArr = schedView==='provider' ? providers.filter(function(p){return p.active!==false;}) : rooms.filter(function(r){return r.active!==false;});
    var head='<tr><th class="rowhead corner">'+(schedView==='provider'?'마사지사':'룸')+'</th>'+slots.map(function(t){ return '<th class="timehead">'+(t%60===0?min2hm(t):'·')+'</th>'; }).join('')+'</tr>';
    var bodyRows=rowsArr.map(function(row){
      var rowBk=schedBookings.filter(function(b){ return b.start_time && (schedView==='provider'? b.provider_id===row.id : b.room_id===row.id); });
      var occ={};
      rowBk.forEach(function(b){ var si=slotIdx(slots,hm2min(b.start_time)); if(si<0)si=0; var span=Math.max(1,Math.ceil((b.duration_min||60)/30)); if(si+span>slots.length)span=slots.length-si; b.__si=si; b.__span=span; occ[si]=b; for(var k=1;k<span;k++)occ[si+k]='x'; });
      var cells=''; var i=0;
      while(i<slots.length){
        if(occ[i] && occ[i]!=='x'){ var b=occ[i]; var ty=(byId(providers,b.provider_id)||{}).tier==='pretty'?'pretty':''; var st=b.status==='serving'?'serving':(b.status==='done'?'done':''); var sub=schedView==='provider'?((byId(rooms,b.room_id)||{}).name||(b.location_type==='outcall'?'출장':'')):((byId(providers,b.provider_id)||{}).name||'아무나'); cells+='<td colspan="'+b.__span+'"><div class="gbk '+ty+' '+st+'" onclick="openBk(\''+b.id+'\')"><b>'+esc(b.nick)+'</b><br>'+esc(sub)+'</div></td>'; i+=b.__span; }
        else { var t=slots[i]; var off=(schedView==='provider' && offShiftAt(row,t)); cells+='<td class="gcell'+(off?' off':'')+'"'+(off?'':' onclick="openSlot(\''+row.id+'\','+t+')"')+'></td>'; i++; }
      }
      return '<tr><th class="rowhead">'+esc(row.name)+(schedView==='provider'&&row.tier==='pretty'?' <span class="tag pretty">프리티</span>':'')+'</th>'+cells+'</tr>';
    }).join('');
    document.getElementById('body').innerHTML=
      '<div class="schtop"><button class="daynav" onclick="changeDate(-1)">‹</button>'+
        '<input type="date" value="'+schedDate+'" onchange="setDate(this.value)">'+
        '<button class="daynav" onclick="changeDate(1)">›</button>'+
        '<div class="vtog"><button class="'+(schedView==='room'?'on':'')+'" onclick="setSchedView(\'room\')">룸</button><button class="'+(schedView==='provider'?'on':'')+'" onclick="setSchedView(\'provider\')">마사지사</button></div>'+
        '<div class="hrset">운영 <input id="h_open" value="'+((shop&&shop.open_time)||'10:00')+'">~<input id="h_close" value="'+((shop&&shop.close_time)||'22:00')+'"><button class="ibtn" onclick="setHours()">적용</button></div></div>'+
      '<div class="slotinfo">빈 칸 클릭 = 예약 추가 · 칸 클릭 = 시작/완료. 손님 예약은 자동 표시됩니다.</div>'+
      (rowsArr.length? '<div class="gwrap"><table class="gtable"><thead>'+head+'</thead><tbody>'+bodyRows+'</tbody></table></div>' : '<div class="empty">'+(schedView==='provider'?'마사지사':'룸')+'를 먼저 등록하세요</div>');
  }

  window.openSlot=function(rowId,t){
    var inProv=schedView==='provider';
    var svcOpt=services.filter(function(s){return s.active!==false;}).map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+' · '+s.duration_min+'분'+(s.price?' · ฿'+s.price:'')+'</option>'; }).join('');
    var partnerOpts = inProv
      ? rooms.filter(function(r){return r.active!==false;}).map(function(r){ return '<option value="'+r.id+'">'+esc(r.name)+'</option>'; }).join('')
      : providers.filter(function(p){return p.active!==false && !offShiftAt(p,t);}).map(function(p){ return '<option value="'+p.id+'">'+esc(p.name)+(p.tier==='pretty'?' (프리티)':'')+'</option>'; }).join('');
    document.getElementById('smodal').innerHTML=
      '<div class="pmh"><div class="t">예약 추가 — '+min2hm(t)+'</div><button class="x" onclick="closeSlot()">✕</button></div>'+
      '<div class="slotinfo">'+(inProv?esc(byId(providers,rowId).name):esc(byId(rooms,rowId).name))+' · '+schedDate+'</div>'+
      '<label>시술</label><select id="o_svc">'+(svcOpt||'<option value="">— 시술을 먼저 등록하세요 —</option>')+'</select>'+
      '<label>'+(inProv?'룸':'마사지사')+'</label><select id="o_partner">'+(partnerOpts||'<option value="">— 없음 —</option>')+'</select>'+
      '<label>손님 닉네임</label><input id="o_nick" placeholder="현장" value="현장">'+
      '<div class="pmsave"><button class="bigbtn" onclick="addSlotBk(\''+rowId+'\','+t+')">예약 넣기</button></div>';
    document.getElementById('smwrap').classList.add('on');
  };
  window.addSlotBk=function(rowId,t){
    var inProv=schedView==='provider';
    var svcId=v('o_svc'), partner=v('o_partner'); if(!svcId){ alert('시술을 선택하세요'); return; }
    var svc=byId(services,svcId);
    var row={ store_slug:slug, nick:v('o_nick')||'현장', lang:'ko', service_id:svcId,
      provider_id: inProv?rowId:(partner||null), room_id: inProv?(partner||null):rowId,

      var byProv={}; penalties.forEach(function(p){ (byProv[p.provider_id]=byProv[p.provider_id]||[]).push(p); });
      var totalPending=penalties.filter(function(p){return p.status==='pending';}).reduce(function(a,p){return a+(p.amount||0);},0);
      var RS={late_edit:'2일 이내 수정'}, ST={pending:'미납',waived:'면제',paid:'납부'};
      b.innerHTML='<div class="addbox"><div class="ttl">⚙️ 스케줄 수정 규칙</div>'+
          '<div class="two"><input id="sc_days" placeholder="무료 수정 마감(일) 예:2" inputmode="numeric" value="'+(sc.cutoffDays!=null?sc.cutoffDays:2)+'"><input id="sc_pen" placeholder="벌금 ฿ 예:200" inputmode="numeric" value="'+(sc.penalty!=null?sc.penalty:'')+'"></div>'+
          '<button class="bigbtn" onclick="saveSched()">저장</button>'+
          '<div style="font-size:11.5px;color:#9aa7a4;margin-top:8px;text-align:center">근무일 N일 전까지 무료, 그 이후 마사지사가 스케줄 수정 시 벌금 부과</div></div>'+
        '<div class="ttl" style="margin:18px 2px 10px">⚠️ 벌금 현황 · 미납 합계 <b style="color:var(--warm)">฿'+totalPending+'</b></div>'+
        (penalties.length? Object.keys(byProv).map(function(pid){ var prov=byId(providers,pid); var rows=byProv[pid];
          var pend=rows.filter(function(p){return p.status==='pending';}).reduce(function(a,p){return a+(p.amount||0);},0);
          return '<div class="addbox" style="padding:12px 14px">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><b>'+esc(prov?prov.name:pid.slice(0,6))+(prov&&prov.tier==='pretty'?' ⭐':'')+'</b><span style="font-weight:800;color:'+(pend?'var(--warm)':'var(--teal)')+'">'+(pend?'미납 ฿'+pend:'미납 없음')+'</span></div>'+
            rows.map(function(p){ return '<div class="row" style="padding:9px 0"><div class="mid"><div class="nm" style="font-size:13.5px">'+p.work_date+' · <span style="font-weight:600;color:var(--muted)">'+(RS[p.reason]||esc(p.reason||''))+'</span></div><div class="meta">฿'+(p.amount||0)+' · '+(ST[p.status]||p.status)+'</div></div><div class="acts">'+(p.status==='pending'?'<button class="ibtn" onclick="penSet(\''+p.id+'\',\'paid\')">납부</button><button class="ibtn" onclick="penSet(\''+p.id+'\',\'waived\')">면제</button>':'<button class="ibtn" onclick="penSet(\''+p.id+'\',\'pending\')">되돌리기</button>')+'<button class="ibtn warn" onclick="delPen(\''+p.id+'\')">삭제</button></div></div>'; }).join('')+
            '</div>';
        }).join('') : '<div class="empty">부과된 벌금이 없어요</div>');
    } else {
      b.innerHTML=(bookings.length?bookings.slice().sort(function(a,c){return (a.start_time||'~').localeCompare(c.start_time||'~');}).map(function(bk){
        var svc=byId(services,bk.service_id), prov=byId(providers,bk.provider_id), room=byId(rooms,bk.room_id), out=bk.location_type==='outcall', serving=bk.status==='serving';
        var where=out?('🚗 출장 '+esc(bk.address||'')):(room?esc(room.name):'-');
        var payb=bk.deposit?(bk.pay_status==='confirmed'?' · 💵확인':bk.pay_status==='submitted'?' · 🧾확인대기':' · ⏳입금전'):'';
        return '<div class="bk '+(serving?'serving':'')+'"><div class="tm"><div class="h">'+(bk.mode==='reserve'?(bk.start_time||''):'NOW')+'</div></div><div class="mid"><div class="nick">'+esc(bk.nick)+(prov?' → '+esc(prov.name):'')+'</div><div class="meta">'+(svc?esc(svc.name)+' · ':'')+where+payb+'</div></div><div class="acts">'+(serving?'<button class="ibtn" onclick="advance(\''+bk.id+'\',\'done\')">완료</button>':'<button class="ibtn" onclick="advance(\''+bk.id+'\',\'serving\')">시작</button>')+'<button class="ibtn warn" onclick="advance(\''+bk.id+'\',\'cancelled\')">취소</button></div></div>';
      }).join(''):'<div class="empty">오늘 예약이 없어요</div>');
    }
  }

  supa.auth.getSession().then(function(r){ updateAuth(r.data&&r.data.session); });
  supa.auth.onAuthStateChange(function(_e,session){ updateAuth(session); });
  function updateAuth(session){
    if(!session){ location.replace('index.html'); return; }
    var email=(session.user&&session.user.email)||'', loginId=email.split('@')[0];
    supa.from('qsm_staff').select('role,store_slug').eq('email',email).then(function(r){
      var rows=r.data||[];
      var staffHere=rows.some(function(x){ return x.store_slug===slug || x.store_slug==='*'; });
      if(staffHere){ if(slug) load(); return; }
      // 이 샵 직원이 아님 — 마사지사면 본인 화면으로, 아니면 권한 없음
      supa.from('qsm_providers').select('id').eq('login_id',loginId).limit(1).then(function(p){
        if(p.data && p.data.length){ location.replace('therapist.html'); return; }
        document.getElementById('body').innerHTML='<div class="empty" style="padding:48px 20px">이 샵 콘솔 접근 권한이 없어요.<br><code>'+esc(loginId)+'</code><br><button class="ibtn" style="margin-top:14px" onclick="doLogout()">로그아웃</button></div>';
      });
    });
  }
  supa.channel('qsm-sc-'+slug)
    .on('postgres_changes',{event:'*',schema:'public',table:'qsm_bookings',filter:'store_slug=eq.'+slug},function(){ load(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'qsm_penalties',filter:'store_slug=eq.'+slug},function(){ load(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'qsm_shifts',filter:'store_slug=eq.'+slug},function(){ if(tab==='schedule') loadSched(); }).subscribe();
})();
</script>
</body>
</html>
