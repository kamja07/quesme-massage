<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe Massage</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
<style>
  .home{max-width:430px; margin:0 auto; min-height:100%; background:#fff; box-shadow:0 0 40px rgba(0,0,0,.05);}
  .home-top{background:var(--teal); color:#fff; padding:18px 18px 16px; position:sticky; top:0; z-index:5;}
  .home-top .row1{display:flex; align-items:center; gap:10px;}
  .home-top .brand{font-size:22px; font-weight:800;} .home-top .brand small{font-size:12px;font-weight:700;opacity:.85;margin-left:4px;}
  .home-top .tag{font-size:12.5px; opacity:.92; margin-top:2px;}
  .home-top .langsel{margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:9px; padding:6px 8px; font-size:12px; font-family:inherit;}
  .home-top .langsel option{color:#16323A;}
  .searchbar{margin-top:13px; display:flex; align-items:center; gap:8px; background:#fff; border-radius:12px; padding:11px 13px;}
  .searchbar input{flex:1; border:none; outline:none; font-size:15px; font-family:inherit; color:var(--ink);}
  .arearow{padding:11px 18px 2px;}
  .arearow select{border:1px solid #d7e2df; border-radius:10px; padding:8px 11px; font-size:13px; font-family:inherit; color:var(--ink); background:#fff;}
  .list{padding:8px 14px 24px;}
  .scard{display:flex; align-items:center; gap:13px; padding:13px; border:1px solid #eef3f1; border-radius:15px; margin-bottom:10px; cursor:pointer; transition:.12s; text-decoration:none; color:var(--ink);}
  .scard:hover{border-color:var(--teal-line); box-shadow:0 4px 14px rgba(0,0,0,.05);}
  .scard .logo{width:54px; height:54px; flex:0 0 54px; border-radius:14px; background:var(--teal-l); display:flex; align-items:center; justify-content:center; font-size:26px; overflow:hidden;}
  .scard .logo img{width:100%; height:100%; object-fit:cover;}
  .scard .mid{flex:1; min-width:0;}
  .scard .nm{font-size:16px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .scard .sub{font-size:12.5px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .scard .badges{margin-top:5px; display:flex; gap:5px;}
  .bdg{font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:20px;}
  .bdg.out{background:#e6f1fb; color:#185fa5;} .bdg.open{background:var(--teal-l); color:var(--teal);}
  .empty{text-align:center; color:#9aa7a4; padding:50px 20px; font-size:14px;}
  .bizfoot{margin:6px 14px 30px; padding:15px 16px; background:#fbfdfc; border:1px solid #e2e9e7; border-radius:14px; text-align:center;}
  .bizfoot .bt{font-size:13px; font-weight:700; color:var(--muted); margin-bottom:10px;}
  .bizfoot .brow{display:flex; gap:9px;}
  .bizfoot a{flex:1; text-decoration:none; border-radius:11px; padding:11px; font-size:13.5px; font-weight:700;}
  .bizfoot a.primary{background:var(--teal); color:#fff;} .bizfoot a.ghost{background:#fff; color:var(--teal); border:1.5px solid var(--teal-line);}
</style>
</head>
<body>
<div class="home">
  <div class="home-top">
    <div class="row1">
      <div><div class="brand">QuesMe <small>Massage</small></div><div class="tag" id="tag"></div></div>
      <select id="langSel" class="langsel" onchange="setLang(this.value)">
        <option value="ko">한국어</option><option value="en">English</option><option value="th">ไทย</option><option value="zh">中文</option><option value="ja">日本語</option><option value="hi">हिन्दी</option><option value="ru">Русский</option>
      </select>
    </div>
    <div class="searchbar"><span>🔍</span><input id="q" oninput="onSearch(this.value)"></div>
  </div>
  <div class="arearow"><select id="area" onchange="onArea(this.value)"></select></div>
  <div class="list" id="list"></div>
  <div class="bizfoot" id="bizfoot"></div>
</div>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var lang = I18N.detectLang();
  function t(k){ return I18N.t(lang,k); }
  var AREA = { nakluea:{ko:'나클루아',en:'Nakluea',th:'นาเกลือ'}, pattaya:{ko:'파타야',en:'Pattaya',th:'พัทยา'}, thonglor:{ko:'텅러',en:'Thonglor',th:'ทองหล่อ'}, asok:{ko:'아속',en:'Asok',th:'อโศก'}, sukhumvit:{ko:'수쿰빗',en:'Sukhumvit',th:'สุขุมวิท'}, siam:{ko:'시암',en:'Siam',th:'สยาม'}, bangna:{ko:'방나',en:'Bangna',th:'บางนา'} };
  function areaName(c){ var a=AREA[c]; if(!a) return c||''; return a[lang]||a.en||a.ko||c; }
  var esc=function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); };

  var shops=[], outShops={}, filter={ q:'', area:'all' };

  window.setLang=function(v){ lang=v; try{localStorage.setItem('quesme:lang',v);}catch(e){} chrome(); render(); };
  window.onSearch=function(v){ filter.q=(v||'').toLowerCase(); render(); };
  window.onArea=function(a){ filter.area=a; render(); };
  function storeName(s){ var n=s.names||{}; return n[lang]||n.en||n.th||n.ko||s.slug; }

  function chrome(){
    document.getElementById('langSel').value=lang;
    document.getElementById('tag').textContent=t('spa.tagline');
    document.getElementById('q').placeholder=t('home.search');
    var areas = Object.keys(shops.reduce(function(m,s){ if(s.area)m[s.area]=1; return m; },{}));
    document.getElementById('area').innerHTML = '<option value="all">📍 '+t('home.allAreas')+'</option>'+areas.map(function(a){ return '<option value="'+a+'"'+(filter.area===a?' selected':'')+'>📍 '+areaName(a)+'</option>'; }).join('');
    var bf=document.getElementById('bizfoot');   // 로그인은 통합 로그인에서만 · 여기선 로그아웃만
    if(bf){ var nk=''; try{ nk=localStorage.getItem('quesme:nick')||''; }catch(e){} bf.innerHTML='<div class="bt">'+(nk?esc(nk)+'님':'')+'</div><div class="brow"><a class="ghost" onclick="doLogout()" style="cursor:pointer">로그아웃</a></div>'; }
  }
  window.doLogout=function(){ supa.auth.signOut().then(function(){ location.replace('index.html'); }); };

  function render(){
    var list=document.getElementById('list');
    var rows = shops.filter(function(s){
      if(filter.area!=='all' && s.area!==filter.area) return false;
      if(filter.q){ var hay=JSON.stringify(s.names||{}).toLowerCase()+' '+(s.slug||''); if(hay.indexOf(filter.q)<0) return false; }
      return true;
    });
    if(!rows.length){ list.innerHTML='<div class="empty">'+t('home.empty')+'</div>'; return; }
    list.innerHTML = rows.map(function(s){
      var logo = s.logo?'<img src="'+esc(s.logo)+'">':'💆';
      var out = outShops[s.slug] ? '<span class="bdg out">🚗 '+t('spa.locOutcall')+'</span>' : '';
      return '<a class="scard" href="book.html?store='+encodeURIComponent(s.slug)+'">'+
        '<div class="logo">'+logo+'</div>'+
        '<div class="mid"><div class="nm">'+esc(storeName(s))+'</div>'+
        '<div class="sub">'+(s.area?areaName(s.area):'')+(s.tagline?' · '+esc(s.tagline):'')+'</div>'+
        '<div class="badges"><span class="bdg open">'+t('home.noWait')+'</span>'+out+'</div></div></a>';
    }).join('');
  }

  function load(){
    supa.from('qsm_shops').select('*').eq('status','active').then(function(res){
      shops=(res.data||[]).sort(function(a,b){ return (a.slug||'').localeCompare(b.slug||''); });
      chrome(); render();
      // 출장 가능 샵 표시
      supa.from('qsm_providers').select('store_slug').eq('outcall_ok',true).then(function(r){
        outShops={}; (r.data||[]).forEach(function(p){ outShops[p.store_slug]=1; }); render();
      });
    });
  }
  // 로그인 필수: 세션 없으면 통합 로그인으로
  supa.auth.getSession().then(function(r){
    if(!(r.data&&r.data.session)){ location.replace('index.html'); return; }
    chrome(); load();
  });
})();
</script>
<script src="pwa.js"></script>
</body>
</html>
