<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16323A">
<script src="inapp.js"></script>
<title>QuesMe · 마사지사</title>
<link rel="stylesheet" href="app.css">
<style>
  .th{max-width:430px; margin:0 auto; min-height:100%; background:#fff; box-shadow:0 0 40px rgba(0,0,0,.05);}
  .th-top{background:var(--ink); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:11px; position:sticky; top:0; z-index:5;}
  .th-top .av{width:40px;height:40px;flex:0 0 40px;border-radius:50%;background:#2c4a52;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;overflow:hidden;}
  .th-top .av img{width:100%;height:100%;object-fit:cover;}
  .th-top .nm{font-size:16px;font-weight:800;} .th-top .sub{font-size:12px;opacity:.8;}
  .th-top .logout{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;}
  .sec{padding:14px 16px;}
  .sec-h{font-size:13.5px;font-weight:800;color:var(--ink);margin:0 0 11px;display:flex;align-items:center;gap:6px;}
  .sec-h .hint{font-size:11px;font-weight:600;color:var(--muted);margin-left:auto;}
  /* 주간 근무표 그리드 */
  .pen-notice{background:#fff3cd;border:1px solid #ffe08a;border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.55;color:#7a5200;font-weight:600;margin-bottom:11px;}
  .pen-notice b{color:var(--warm);font-weight:800;}
  .glegend{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:8px;}
  .glegend i{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:4px;border:1px solid #e2e9e7;}
  .glegend i.work{background:#fff;} .glegend i.rest{background:var(--warm);border-color:var(--warm);}
  .gwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #eef3f1;border-radius:12px;}
  .gtable{border-collapse:collapse;table-layout:fixed;}
  .gtable th,.gtable td{border:1px solid #eef3f1;}
  .gtable thead th{position:sticky;top:0;background:#fff;z-index:2;padding:5px 3px;font-size:11px;font-weight:800;color:var(--ink);min-width:42px;line-height:1.25;}
  .gtable thead th .wd{display:block;font-size:9.5px;font-weight:700;color:var(--muted);}
  .gtable thead th.late{background:#fff3cd;color:var(--warm);}
  .gtable thead th.late .wd{color:var(--warm);}
  .gtable thead th.late .lk{display:block;font-size:9px;font-weight:800;color:var(--warm);}
  .gtable th.timecol,.gtable td.timecol{position:sticky;left:0;background:#fbfdfc;z-index:1;font-size:10px;color:var(--muted);font-weight:700;padding:0 6px;white-space:nowrap;width:42px;}
  .gtable thead th.timecol{z-index:3;}
  .gtable td.timecol.hh{color:var(--ink);font-weight:800;}
  .gtable td.cell{height:24px;cursor:pointer;background:#fff;}
  .gtable td.cell.rest{background:var(--warm);}
  .gtable td.cell.latecol{box-shadow:inset 0 0 0 99px rgba(255,243,205,.5);}
  .gtable td.cell.rest.latecol{box-shadow:none;}
  .gsavebar{margin-top:12px;}
  .gsavebar button{width:100%;padding:13px;border-radius:12px;border:none;background:var(--teal);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
  .gsavebar button:disabled{background:#cfd8d4;} .gsavebar button.pen{background:var(--warm);}
  /* 벌금 */
  .penbox{background:#fff8e6;border:1px solid #ffe7a0;border-radius:14px;padding:13px 15px;}
  .penbox.zero{background:var(--teal-l);border-color:var(--teal-line);}
  .pen-sum{font-size:14px;font-weight:800;color:#9a6a00;}
  .penbox.zero .pen-sum{color:var(--teal);}
  .pen-list{margin-top:9px;}
  .pen-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-top:1px solid #ffe7a0;}
  .pen-row .k{color:#a8810a;} .pen-row .v{font-weight:800;color:#9a6a00;}
  .pen-row .st{font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:20px;}
  .st.pending{background:#fdecea;color:var(--warm);} .st.waived{background:var(--teal-l);color:var(--teal);} .st.paid{background:#eef3f1;color:var(--muted);}
  /* 예약 */
  .bk{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #eef3f1;border-radius:13px;margin-bottom:9px;}
  .bk.serving{border-color:var(--warm);background:var(--warm-l);}
  .bk .tm{flex:0 0 54px;text-align:center;}
  .bk .tm .h{font-size:14.5px;font-weight:800;color:var(--teal);} .bk .tm .d{font-size:10px;color:var(--muted);}
  .bk .mid{flex:1;min-width:0;} .bk .nick{font-size:14.5px;font-weight:800;} .bk .meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .bk .acts{display:flex;flex-direction:column;gap:5px;}
  .empty{text-align:center;color:#9aa7a4;padding:24px;font-size:13px;}
  .otag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;background:#e6f1fb;color:#185fa5;}
  /* login */
  .loginwrap{position:fixed;inset:0;background:#0c1a1f;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .logincard{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:360px;}
  .loginh{text-align:center;font-size:20px;font-weight:800;color:var(--teal);}
  .logint{text-align:center;font-size:14px;color:var(--muted);margin:4px 0 18px;font-weight:700;}
  .logincard input{width:100%;padding:13px;border:1.5px solid #d7e2df;border-radius:11px;font-size:15px;font-family:inherit;margin-bottom:10px;}
  .logincard input:focus{outline:none;border-color:var(--teal);}
  .loginErr{color:var(--warm);font-size:13px;text-align:center;margin-top:10px;min-height:1px;}
  .loginAlt{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
  .loginAlt a{color:var(--teal);font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="loginwrap" id="loginwrap">
  <div class="logincard">
    <div class="loginh">QuesMe</div>
    <div class="logint">마사지사 로그인</div>
    <input id="liId" placeholder="아이디 (샵에서 발급)" autocapitalize="off">
    <input id="liPw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="bigbtn" onclick="doLogin()" id="loginBtn">로그인</button>
    <div class="loginErr" id="liErr"></div>
    <div class="loginAlt" id="signupRow" style="display:none">첫 로그인인가요? <a onclick="doSignup()">비밀번호 설정 →</a></div>
  </div>
</div>

<div class="th">
  <div class="th-top"><span class="av" id="av"></span><div><div class="nm" id="who">—</div><div class="sub" id="sub"></div></div>
    <button class="logout" onclick="doLogout()">로그아웃</button></div>
  <div id="content"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var TIER={pretty:'프리티',regular:'전문'};
  var WD=['일','월','화','수','목','금','토'];
  var me=null, shop=null, services=[], rooms=[], bookings=[], shiftMap={}, penalties=[], drafts={};

  function pad(n){ return String(n).padStart(2,'0'); }
  function dstr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function today(){ return dstr(new Date()); }
  function addDays(base,n){ var d=new Date(base+'T00:00:00'); d.setDate(d.getDate()+n); return d; }
  function weekDates(){ var out=[], t=today(); for(var i=0;i<7;i++) out.push(dstr(addDays(t,i))); return out; }
  function daysUntil(date){ var a=new Date(today()+'T00:00:00'), b=new Date(date+'T00:00:00'); return Math.round((b-a)/86400000); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
  function byId(a,id){ for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }
  function emailOf(){ var id=(document.getElementById('liId').value||'').trim().toLowerCase(); return id.indexOf('@')<0?id+'@thaimate.app':id; }
  function rules(){ var s=(shop&&shop.sched)||{}; return { cutoff:s.cutoffDays!=null?s.cutoffDays:2, penalty:s.penalty||0 }; }

  window.doLogin=function(){
    document.getElementById('liErr').textContent='';
    supa.auth.signInWithPassword({ email:emailOf(), password:document.getElementById('liPw').value||'' }).then(function(r){
      if(r&&r.error){ document.getElementById('liErr').textContent='로그인 실패 — 아이디/비밀번호 확인'; document.getElementById('signupRow').style.display='block'; }
    });
  };
  window.doSignup=function(){
    document.getElementById('liErr').textContent='';
    var pw=document.getElementById('liPw').value||'';
    if(pw.length<6){ document.getElementById('liErr').textContent='비밀번호는 6자 이상'; return; }
    supa.auth.signUp({ email:emailOf(), password:pw }).then(function(r){
      if(r&&r.error){ document.getElementById('liErr').textContent='설정 실패 — '+(r.error.message||''); }
    });
  };
  window.doLogout=function(){ supa.auth.signOut(); };

  function loadMe(session){
    var email=(session.user&&session.user.email)||''; var loginId=email.split('@')[0];
    supa.from('qsm_providers').select('*').eq('login_id',loginId).limit(1).then(function(r){
      me=(r.data&&r.data[0])||null;
      if(!me){ document.getElementById('content').innerHTML='<div class="sec"><div class="empty">이 계정에 연결된 마사지사 정보가 없어요.<br>샵 관리자에게 아이디 등록을 요청하세요.<br><code>'+esc(loginId)+'</code></div></div>'; document.getElementById('who').textContent=loginId; return; }
      document.getElementById('av').innerHTML = me.avatar?'<img src="'+esc(me.avatar)+'">':esc((me.name||'?').charAt(0).toUpperCase());
      document.getElementById('who').textContent = me.name + (me.freelance?' · 프리랜서':'');
      document.getElementById('sub').textContent = (TIER[me.tier]||'') + (me.outcall_ok?' · 출장 가능':'');
      Promise.all([
        supa.from('qsm_shops').select('*').eq('slug',me.store_slug).maybeSingle(),
        supa.from('qsm_services').select('*').eq('store_slug',me.store_slug),
        supa.from('qsm_rooms').select('*').eq('store_slug',me.store_slug)
      ]).then(function(rr){ shop=rr[0].data||{}; services=rr[1].data||[]; rooms=rr[2].data||[]; loadAll(); });
    });
  }

  function loadAll(){
    if(!me) return;
    var wk=weekDates();
    Promise.all([
      supa.from('qsm_shifts').select('*').eq('provider_id',me.id).gte('work_date',wk[0]).lte('work_date',wk[6]),
      supa.from('qsm_bookings').select('*').eq('provider_id',me.id).gte('book_date',today()).neq('status','cancelled').neq('status','done'),
      supa.from('qsm_penalties').select('*').eq('provider_id',me.id).order('work_date',{ascending:false})
    ]).then(function(r){
      shiftMap={}; (r[0].data||[]).forEach(function(s){ shiftMap[s.work_date]=s; });
      bookings=r[1].data||[]; penalties=r[2].data||[];
      drafts={};   // 저장된 값 → 30분 blocks로 초기화
      wk.forEach(function(d){ drafts[d]={ blocks:savedBlocks(d) }; });
      render();
    });
  }

  // ---- 그리드 근무표: draft.blocks = {슬롯시각:1} = 비근무(빨강) ----
  function hm2min(x){ var p=(x||'').split(':'); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
  function min2hm(m){ return pad(Math.floor(m/60))+':'+pad(m%60); }
  function shopOpen(){ return hm2min((shop&&shop.open_time)||'10:00'); }
  function shopClose(){ var o=shopOpen(), c=hm2min((shop&&shop.close_time)||'22:00'); return c<=o?o+12*60:c; }
  function rowSlots(){ var out=[], c=shopClose(); for(var m=shopOpen(); m+30<=c; m+=30) out.push(m); return out; }
  function savedBlocks(date){ var s=shiftMap[date], b={}; if(s){ if(s.off){ rowSlots().forEach(function(m){b[m]=1;}); } else (s.off_slots||[]).forEach(function(sl){ for(var m=hm2min(sl.s);m<hm2min(sl.e);m+=30) b[m]=1; }); } return b; }
  function blocksToOffslots(b){ var ms=Object.keys(b).map(Number).sort(function(a,c){return a-c;}), out=[], i=0; while(i<ms.length){ var st=ms[i], en=ms[i]+30; while(i+1<ms.length && ms[i+1]===en){ en+=30; i++; } out.push({s:min2hm(st),e:min2hm(en)}); i++; } return out; }
  function dirty(date){ var a=Object.keys(drafts[date].blocks).sort(), b=Object.keys(savedBlocks(date)).sort(); return JSON.stringify(a)!==JSON.stringify(b); }

  window.toggleCell=function(date,m){ var b=drafts[date].blocks; if(b[m]) delete b[m]; else b[m]=1; render(); };
  window.saveAll=function(){
    var r=rules(), wk=weekDates(), dd=wk.filter(dirty);
    if(!dd.length) return;
    var fined=dd.filter(function(d){ return daysUntil(d)<r.cutoff && !!shiftMap[d] && r.penalty>0; });
    if(fined.length){
      var total=fined.length*r.penalty;
      if(!confirm(fined.length+'개 날짜가 근무 '+r.cutoff+'일 이내예요.\n변경 시 벌금 ฿'+total+' ('+fined.length+'일 × ฿'+r.penalty+')이 부과됩니다.\n\n그래도 저장할까요?')) return;
    }
    var allRows=rowSlots().length;
    var payload=dd.map(function(d){ var b=drafts[d].blocks, full=Object.keys(b).length>=allRows;
      return { store_slug:me.store_slug, provider_id:me.id, work_date:d, off:full,
        avail:(shiftMap[d]&&shiftMap[d].avail)||(me.outcall_ok?'both':'shop'),
        off_slots: full?[]:blocksToOffslots(b),
        start_time:(shop&&shop.open_time)||'10:00', end_time:(shop&&shop.close_time)||'22:00' }; });
    supa.from('qsm_shifts').upsert(payload,{onConflict:'provider_id,work_date'}).then(function(res){
      if(res&&res.error){ alert('저장 실패: '+(res.error.message||res.error)); return; }
      if(fined.length){ supa.from('qsm_penalties').insert(fined.map(function(d){ return { store_slug:me.store_slug, provider_id:me.id, work_date:d, amount:r.penalty, reason:'late_edit' }; })).then(loadAll); }
      else loadAll();
    });
  };
  window.advance=function(id,to){ supa.from('qsm_bookings').update({status:to}).eq('id',id).then(loadAll); };

  function gridSection(){
    var wk=weekDates(), rows=rowSlots(), r=rules();
    var dirtyN=wk.filter(dirty).length;
    var finedN=wk.filter(function(d){ return dirty(d) && daysUntil(d)<r.cutoff && !!shiftMap[d] && r.penalty>0; }).length;
    var notice='<div class="pen-notice">⚠️ 근무일 <b>'+r.cutoff+'일 전까지 무료</b>로 바꾸세요. 그 이후(🔒 표시된 날짜) 변경하면 <b>건당 ฿'+r.penalty+'</b> 벌금이 부과됩니다.</div>';
    var legend='<div class="glegend"><span><i class="work"></i>근무</span><span><i class="rest"></i>비근무</span><span style="margin-left:auto">칸 탭 → 빨강(쉬는 시간)</span></div>';
    var head='<tr><th class="timecol"></th>'+wk.map(function(d){ var dt=new Date(d+'T00:00:00'), late=daysUntil(d)<r.cutoff&&r.penalty>0; return '<th class="'+(late?'late':'')+'">'+(dt.getMonth()+1)+'/'+dt.getDate()+'<span class="wd">'+WD[dt.getDay()]+(daysUntil(d)===0?'·오늘':'')+'</span>'+(late?'<span class="lk">🔒</span>':'')+'</th>'; }).join('')+'</tr>';
    var body=rows.map(function(m){ var hh=(m%60===0);
      var cells=wk.map(function(d){ var late=daysUntil(d)<r.cutoff&&r.penalty>0, rest=!!drafts[d].blocks[m]; return '<td class="cell'+(rest?' rest':'')+(late?' latecol':'')+'" onclick="toggleCell(\''+d+'\','+m+')"></td>'; }).join('');
      return '<tr><td class="timecol'+(hh?' hh':'')+'">'+min2hm(m)+'</td>'+cells+'</tr>';
    }).join('');
    var table='<div class="gwrap"><table class="gtable"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
    var lbl = finedN? ('벌금 ฿'+(finedN*r.penalty)+' 감수하고 저장 · '+dirtyN+'일') : ('변경 저장'+(dirtyN?' · '+dirtyN+'일':''));
    var bar='<div class="gsavebar"><button class="'+(finedN?'pen':'')+'" '+(dirtyN?'':'disabled')+' onclick="saveAll()">'+lbl+'</button></div>';
    return notice+legend+table+bar;
  }

  function penSection(){
    var pend=penalties.filter(function(p){return p.status==='pending';});
    var total=pend.reduce(function(a,p){return a+(p.amount||0);},0);
    var head='<div class="penbox '+(total?'':'zero')+'"><div class="pen-sum">'+(total?('⚠️ 미납 벌금 ฿'+total):'✅ 벌금 없음')+'</div>';
    var list = penalties.length ? '<div class="pen-list">'+penalties.slice(0,8).map(function(p){
      return '<div class="pen-row"><span class="k">'+p.work_date+' · '+(p.reason==='late_edit'?'2일 이내 수정':esc(p.reason||''))+'</span><span class="v">฿'+(p.amount||0)+' <span class="st '+(p.status||'pending')+'">'+({pending:'미납',waived:'면제',paid:'납부'}[p.status]||p.status)+'</span></span></div>';
    }).join('')+'</div>' : '';
    return head+list+'</div>';
  }

  function render(){
    var wk=weekDates();
    var week='<div class="sec"><div class="sec-h">📅 이번 주 근무표 <span class="hint">오늘부터 7일</span></div>'+gridSection()+'</div>';
    var pens='<div class="sec"><div class="sec-h">💸 내 벌금</div>'+penSection()+'</div>';
    var list = bookings.slice().sort(function(a,b){ return (a.book_date+(a.start_time||'~')).localeCompare(b.book_date+(b.start_time||'~')); }).map(function(b){
      var svc=byId(services,b.service_id), room=byId(rooms,b.room_id), out=b.location_type==='outcall', serving=b.status==='serving';
      var where = out?('<span class="otag">🚗 출장</span> '+esc(b.address||'')):(room?esc(room.name):'-');
      var tm = b.mode==='reserve'?(b.start_time||''):'NOW';
      var dt=new Date(b.book_date+'T00:00:00'); var dlbl=(dt.getMonth()+1)+'/'+dt.getDate();
      return '<div class="bk '+(serving?'serving':'')+'"><div class="tm"><div class="h">'+tm+'</div><div class="d">'+dlbl+(svc?' · '+svc.duration_min+'분':'')+'</div></div>'+
        '<div class="mid"><div class="nick">'+esc(b.nick)+'</div><div class="meta">'+(svc?esc(svc.name)+' · ':'')+where+'</div></div>'+
        '<div class="acts">'+(serving?'<button class="btn sm" onclick="advance(\''+b.id+'\',\'done\')">완료</button>':'<button class="btn sm" onclick="advance(\''+b.id+'\',\'serving\')">시작</button><button class="btn gray sm" onclick="advance(\''+b.id+'\',\'cancelled\')">취소</button>')+'</div></div>';
    }).join('') || '<div class="empty">예정된 예약이 없어요</div>';
    var bks='<div class="sec"><div class="sec-h">🗓 내 예약 ('+bookings.length+')</div>'+list+'</div>';
    document.getElementById('content').innerHTML = week + pens + bks;
  }

  supa.auth.getSession().then(function(r){ updateAuth(r.data&&r.data.session); });
  supa.auth.onAuthStateChange(function(_e,session){ updateAuth(session); });
  function updateAuth(session){ document.getElementById('loginwrap').style.display = session?'none':'flex'; if(session){ loadMe(session); } }
  supa.channel('quesme-th').on('postgres_changes',{event:'*',schema:'public',table:'qsm_bookings'},function(){ if(me) loadAll(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'qsm_penalties'},function(){ if(me) loadAll(); }).subscribe();
})();
</script>
</body>
</html>
