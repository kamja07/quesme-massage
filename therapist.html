<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16323A">
<script src="inapp.js"></script>
<title>QuesMe · 마사지사</title>
<link rel="stylesheet" href="app.css">
<style>
  .th{max-width:560px; margin:0 auto; min-height:100%; background:#fff;}
  .th-top{background:var(--ink); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:11px;}
  .th-top .av{width:40px;height:40px;flex:0 0 40px;border-radius:50%;background:#2c4a52;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;overflow:hidden;}
  .th-top .av img{width:100%;height:100%;object-fit:cover;}
  .th-top .nm{font-size:16px;font-weight:800;} .th-top .sub{font-size:12px;opacity:.8;}
  .th-top .logout{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;}
  .sec{padding:14px 18px;}
  .sec-h{font-size:13px;font-weight:800;color:var(--ink);margin:0 0 11px;}
  .ci{border:1.5px solid #eef3f1;border-radius:15px;padding:15px;}
  .ci.on{border-color:var(--teal);background:var(--teal-l);}
  .ci-row{display:flex;align-items:center;gap:10px;}
  .ci-row .t{font-size:16px;font-weight:800;color:var(--ink);}
  .toggle{margin-left:auto;width:54px;height:30px;border-radius:18px;background:#cfd8d4;position:relative;transition:.15s;cursor:pointer;flex:0 0 54px;}
  .toggle.on{background:var(--teal);}
  .toggle .k{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.15s;}
  .toggle.on .k{left:27px;}
  .availrow{display:flex;gap:7px;margin-top:13px;}
  .achip{flex:1;padding:10px;border-radius:11px;border:1.5px solid #d7e2df;background:#fff;font-size:13px;font-weight:700;color:var(--muted);text-align:center;cursor:pointer;}
  .achip.on{border-color:var(--teal);background:var(--teal);color:#fff;}
  .hours{display:flex;align-items:center;gap:8px;margin-top:12px;}
  .hours select{flex:1;padding:10px;border:1.5px solid #d7e2df;border-radius:10px;font-size:14px;font-family:inherit;}
  .bk{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid #eef3f1;border-radius:13px;margin-bottom:9px;}
  .bk.serving{border-color:var(--warm);background:var(--warm-l);}
  .bk .tm{flex:0 0 56px;text-align:center;}
  .bk .tm .h{font-size:15px;font-weight:800;color:var(--teal);} .bk .tm .d{font-size:10px;color:var(--muted);}
  .bk .mid{flex:1;min-width:0;} .bk .nick{font-size:15px;font-weight:800;} .bk .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .bk .acts{display:flex;flex-direction:column;gap:5px;}
  .empty{text-align:center;color:#9aa7a4;padding:26px;font-size:13px;}
  .otag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;background:#e6f1fb;color:#185fa5;}
  /* login */
  .loginwrap{position:fixed;inset:0;background:#0c1a1f;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .logincard{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:360px;}
  .loginh{text-align:center;font-size:20px;font-weight:800;color:var(--teal);}
  .logint{text-align:center;font-size:14px;color:var(--muted);margin:4px 0 18px;font-weight:700;}
  .logincard input{width:100%;padding:13px;border:1.5px solid #d7e2df;border-radius:11px;font-size:15px;font-family:inherit;margin-bottom:10px;}
  .logincard input:focus{outline:none;border-color:var(--teal);}
  .loginErr{color:var(--warm);font-size:13px;text-align:center;margin-top:10px;min-height:1px;}
  .loginAlt{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
  .loginAlt a{color:var(--teal);font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="loginwrap" id="loginwrap">
  <div class="logincard">
    <div class="loginh">QuesMe</div>
    <div class="logint" id="loginT">마사지사 로그인</div>
    <input id="liId" placeholder="아이디 (샵에서 발급)" autocapitalize="off">
    <input id="liPw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="bigbtn" onclick="doLogin()" id="loginBtn">로그인</button>
    <div class="loginErr" id="liErr"></div>
    <div class="loginAlt" id="signupRow" style="display:none">첫 로그인인가요? <a onclick="doSignup()">비밀번호 설정 →</a></div>
  </div>
</div>

<div class="th">
  <div class="th-top"><span class="av" id="av"></span><div><div class="nm" id="who">—</div><div class="sub" id="sub"></div></div>
    <button class="logout" onclick="doLogout()">로그아웃</button></div>
  <div id="content"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var TIER={pretty:'프리티',regular:'일반'};
  var me=null, myShift=null, services=[], rooms=[], bookings=[];
  function today(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
  function byId(a,id){ for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }
  function emailOf(){ var id=(document.getElementById('liId').value||'').trim().toLowerCase(); return id.indexOf('@')<0?id+'@thaimate.app':id; }

  window.doLogin=function(){
    document.getElementById('liErr').textContent='';
    supa.auth.signInWithPassword({ email:emailOf(), password:document.getElementById('liPw').value||'' }).then(function(r){
      if(r&&r.error){ document.getElementById('liErr').textContent='로그인 실패 — 아이디/비밀번호 확인'; document.getElementById('signupRow').style.display='block'; }
    });
  };
  window.doSignup=function(){
    document.getElementById('liErr').textContent='';
    var pw=document.getElementById('liPw').value||'';
    if(pw.length<6){ document.getElementById('liErr').textContent='비밀번호는 6자 이상'; return; }
    supa.auth.signUp({ email:emailOf(), password:pw }).then(function(r){
      if(r&&r.error){ document.getElementById('liErr').textContent='설정 실패 — '+(r.error.message||''); }
    });
  };
  window.doLogout=function(){ supa.auth.signOut(); };

  function loadMe(session){
    var email=(session.user&&session.user.email)||''; var loginId=email.split('@')[0];
    supa.from('qsm_providers').select('*').eq('login_id',loginId).limit(1).then(function(r){
      me=(r.data&&r.data[0])||null;
      if(!me){ document.getElementById('content').innerHTML='<div class="sec"><div class="empty">이 계정에 연결된 마사지사 정보가 없어요.<br>샵 관리자에게 아이디 등록을 요청하세요.<br><code>'+esc(loginId)+'</code></div></div>'; document.getElementById('who').textContent=loginId; return; }
      document.getElementById('av').innerHTML = me.avatar?'<img src="'+esc(me.avatar)+'">':esc((me.name||'?').charAt(0).toUpperCase());
      document.getElementById('who').textContent = me.name + (me.freelance?' · 프리랜서':'');
      document.getElementById('sub').textContent = (TIER[me.tier]||'') + (me.outcall_ok?' · 출장 가능':'');
      Promise.all([
        supa.from('qsm_services').select('*').eq('store_slug',me.store_slug),
        supa.from('qsm_rooms').select('*').eq('store_slug',me.store_slug)
      ]).then(function(rr){ services=rr[0].data||[]; rooms=rr[1].data||[]; loadDay(); });
    });
  }

  function loadDay(){
    if(!me) return;
    Promise.all([
      supa.from('qsm_shifts').select('*').eq('provider_id',me.id).eq('work_date',today()).maybeSingle(),
      supa.from('qsm_bookings').select('*').eq('provider_id',me.id).eq('book_date',today()).neq('status','cancelled').neq('status','done')
    ]).then(function(r){ myShift=r[0].data||null; bookings=r[1].data||[]; render(); });
  }

  var draft={ on:false, avail:'shop', start:'10:00', end:'22:00' };
  function syncDraft(){ if(myShift){ draft.on=!myShift.off; draft.avail=myShift.avail||'shop'; draft.start=myShift.start_time||'10:00'; draft.end=myShift.end_time||'22:00'; } }
  window.tog=function(){ draft.on=!draft.on; saveShift(); };
  window.setAvail=function(v){ draft.avail=v; saveShift(); };
  window.setHr=function(k,v){ draft[k]=v; saveShift(); };
  function saveShift(){
    supa.from('qsm_shifts').upsert({ store_slug:me.store_slug, provider_id:me.id, work_date:today(), avail:draft.avail, start_time:draft.start, end_time:draft.end, off:!draft.on }, { onConflict:'provider_id,work_date' }).then(function(){ loadDay(); });
  }
  window.advance=function(id,to){ supa.from('qsm_bookings').update({status:to}).eq('id',id).then(function(){ loadDay(); }); }

  function hourOpts(sel){ var o=''; for(var h=8;h<=23;h++){ var v=String(h).padStart(2,'0')+':00'; o+='<option value="'+v+'"'+(sel===v?' selected':'')+'>'+v+'</option>'; var v2=String(h).padStart(2,'0')+':30'; o+='<option value="'+v2+'"'+(sel===v2?' selected':'')+'>'+v2+'</option>'; } return o; }

  function render(){
    syncDraft();
    var on=draft.on;
    var ci='<div class="ci '+(on?'on':'')+'">'+
      '<div class="ci-row"><div class="t">'+(on?'🟢 오늘 출근':'⚪ 오늘 휴무')+'</div><div class="toggle '+(on?'on':'')+'" onclick="tog()"><div class="k"></div></div></div>'+
      (on?('<div class="availrow">'+
        ['shop','outcall','both'].map(function(a){ var lbl={shop:'🏠 샵',outcall:'🚗 출장',both:'샵+출장'}[a]; var dis=(a!=='shop'&&!me.outcall_ok); return '<div class="achip '+(draft.avail===a?'on':'')+(dis?' dis':'')+'" '+(dis?'style="opacity:.4;pointer-events:none"':'onclick="setAvail(\''+a+'\')"')+'>'+lbl+'</div>'; }).join('')+'</div>'+
        '<div class="hours"><select onchange="setHr(\'start\',this.value)">'+hourOpts(draft.start)+'</select><span>~</span><select onchange="setHr(\'end\',this.value)">'+hourOpts(draft.end)+'</select></div>'):'')+
      '</div>';

    var list = bookings.slice().sort(function(a,b){ return (a.start_time||'~').localeCompare(b.start_time||'~'); }).map(function(b){
      var svc=byId(services,b.service_id), room=byId(rooms,b.room_id), out=b.location_type==='outcall', serving=b.status==='serving';
      var where = out?('<span class="otag">🚗 출장</span> '+esc(b.address||'')):(room?esc(room.name):'-');
      var tm = b.mode==='reserve'?(b.start_time||''):'NOW';
      return '<div class="bk '+(serving?'serving':'')+'"><div class="tm"><div class="h">'+tm+'</div><div class="d">'+(svc?svc.duration_min+'분':'')+'</div></div>'+
        '<div class="mid"><div class="nick">'+esc(b.nick)+'</div><div class="meta">'+(svc?esc(svc.name)+' · ':'')+where+'</div></div>'+
        '<div class="acts">'+(serving?'<button class="btn sm" onclick="advance(\''+b.id+'\',\'done\')">완료</button>':'<button class="btn sm" onclick="advance(\''+b.id+'\',\'serving\')">시작</button><button class="btn gray sm" onclick="advance(\''+b.id+'\',\'cancelled\')">취소</button>')+'</div></div>';
    }).join('') || '<div class="empty">오늘 예약이 없어요</div>';

    document.getElementById('content').innerHTML =
      '<div class="sec"><div class="sec-h">📅 오늘 출근 ('+today()+')</div>'+ci+'</div>'+
      '<div class="sec"><div class="sec-h">🗓 내 예약 ('+bookings.length+')</div>'+list+'</div>';
  }

  supa.auth.getSession().then(function(r){ updateAuth(r.data&&r.data.session); });
  supa.auth.onAuthStateChange(function(_e,session){ updateAuth(session); });
  function updateAuth(session){
    document.getElementById('loginwrap').style.display = session?'none':'flex';
    if(session){ loadMe(session); }
  }
  // realtime
  supa.channel('quesme-th').on('postgres_changes',{event:'*',schema:'public',table:'qsm_bookings'},function(){ if(me) loadDay(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'qsm_shifts'},function(){ if(me) loadDay(); }).subscribe();
})();
</script>
</body>
</html>
