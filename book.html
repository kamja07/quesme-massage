<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
<style>
  .langsel{margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:9px; padding:6px 8px; font-size:12px; font-family:inherit;}
  .langsel option{color:#16323A;}
  .spa-body{padding:14px 16px 30px; max-width:560px; margin:0 auto;}
  .sec{margin-bottom:20px;}
  .sec-h{font-size:14px; font-weight:800; color:var(--ink); margin:0 0 10px; display:flex; align-items:center; gap:7px;}
  .sec-h .num{width:20px; height:20px; flex:0 0 20px; background:var(--teal); color:#fff; border-radius:50%; font-size:12px; display:inline-flex; align-items:center; justify-content:center;}
  .opts{display:flex; flex-direction:column; gap:8px;}
  .opt{display:flex; align-items:center; gap:11px; padding:13px 14px; border:1.5px solid #e2e9e7; border-radius:13px; cursor:pointer; background:#fff; transition:.12s;}
  .opt.on{border-color:var(--teal); background:var(--teal-l);}
  .opt .tick{margin-left:auto; width:20px; height:20px; flex:0 0 20px; border-radius:50%; border:1.5px solid #d7e2df;}
  .opt.on .tick{border-color:var(--teal); background:var(--teal); box-shadow:inset 0 0 0 3px #fff;}
  .opt .nm{font-size:15px; font-weight:700; color:var(--ink);}
  .opt .meta{font-size:12.5px; color:var(--muted); margin-top:1px;}
  .opt .av{width:38px; height:38px; flex:0 0 38px; border-radius:50%; background:var(--teal-l); color:var(--teal); font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .opt .av img{width:100%;height:100%;object-fit:cover;}
  .rbadge{font-size:11px; font-weight:800; padding:3px 8px; border-radius:20px;}
  .rbadge.private{background:var(--teal-l); color:var(--teal);}
  .rbadge.shared{background:#fff4dd; color:#9a6a00;}
  .rbadge.group{background:var(--warm-l); color:var(--warm);}
  /* 마사지사 프로필 메뉴 */
  .grp-h{font-size:12.5px; font-weight:800; color:var(--muted); margin:14px 0 9px; display:flex; align-items:center; gap:6px;}
  .provgrid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .pcard{position:relative; border:1.5px solid #e2e9e7; border-radius:15px; padding:14px 10px 12px; cursor:pointer; background:#fff; text-align:center; transition:.12s;}
  .pcard.on{border-color:var(--teal); background:var(--teal-l);}
  .pcard .pic{width:66px; height:66px; border-radius:50%; margin:2px auto 9px; background:var(--teal-l); color:var(--teal); font-weight:800; font-size:26px; display:flex; align-items:center; justify-content:center; overflow:hidden; box-shadow:0 0 0 2px var(--teal-line);}
  .pcard.pretty .pic{box-shadow:0 0 0 2px #e6b800;}
  .pcard .pic img{width:100%; height:100%; object-fit:cover;}
  .pcard .pnm{font-size:14.5px; font-weight:800; color:var(--ink);}
  .pcard .pbio{font-size:11px; color:var(--muted); margin-top:2px; min-height:14px; line-height:1.35;}
  .pcard .pextra{font-size:11.5px; font-weight:800; color:var(--amber); margin-top:4px;}
  .pcard .ptier{position:absolute; top:9px; left:9px; font-size:10px; font-weight:800; padding:2px 7px; border-radius:20px;}
  .ptier.pretty{background:#fff3cd; color:#9a6a00;}
  .ptier.regular{background:#eef3f1; color:#5f6f6c;}
  .pcard.on .ptick{position:absolute; top:9px; right:9px; color:var(--teal); font-weight:900; font-size:14px;}
  .modetabs{display:flex; gap:8px; margin-bottom:10px;}
  .mtab{flex:1; padding:11px; border-radius:11px; border:1.5px solid #e2e9e7; background:#fff; font-size:14px; font-weight:700; color:var(--muted);}
  .mtab.on{border-color:var(--teal); background:var(--teal); color:#fff;}
  .field input, .field select{width:100%; padding:13px; border:1.5px solid #d7e2df; border-radius:12px; font-size:15px; font-family:inherit; color:var(--ink);}
  .field input:focus, .field select:focus{outline:none; border-color:var(--teal);}
  .field label{display:block; font-size:12.5px; color:var(--muted); font-weight:700; margin-bottom:7px;}
  .err{color:var(--warm); font-size:13px; text-align:center; min-height:1px; margin:4px 0;}
  /* ticket */
  .tk{background:var(--teal-l); border:1.5px solid var(--teal-line); border-radius:18px; padding:20px; text-align:center; margin-top:6px;}
  .tk .big{font-size:22px; font-weight:800; color:var(--teal);}
  .tk .nick{font-size:15px; color:var(--ink); margin-top:4px;}
  .tk .rows{text-align:left; background:#fff; border-radius:13px; padding:13px 15px; margin:15px 0;}
  .tk .r{display:flex; justify-content:space-between; gap:12px; padding:6px 0; font-size:14px;}
  .tk .r + .r{border-top:1px solid #eef3f1;}
  .tk .r .k{color:var(--muted);} .tk .r .v{font-weight:700; color:var(--ink); text-align:right;}
  .tk .status{font-size:14px; font-weight:700; padding:11px; border-radius:11px; background:#fff;}
  .tk .status.serving{background:var(--warm); color:#fff;}
  /* 위저드 */
  .wstep{padding-bottom:92px;}
  .wprog{font-size:12px; color:var(--teal); font-weight:800; margin-bottom:5px;}
  .wtitle{font-size:19px; font-weight:800; color:var(--ink); margin-bottom:15px;}
  .wsum{background:#fbfdfc; border:1px solid #eef3f1; border-radius:13px; padding:12px 14px; margin-top:14px;}
  .wsum .r{display:flex; justify-content:space-between; gap:10px; font-size:13.5px; padding:4px 0;}
  .wsum .r .k{color:var(--muted);} .wsum .r .v{font-weight:700; color:var(--ink); text-align:right;}
  .wnav{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #eef3f1; z-index:20;}
  .wnav-in{max-width:560px; margin:0 auto; display:flex; gap:10px; align-items:center; padding:12px 16px calc(12px + env(safe-area-inset-bottom));}
  .wnav-in .back{flex:0 0 auto; padding:0 18px; background:#eef3f1; color:#3c4a4d;}
  .wnav-in .bigbtn{flex:1; margin:0;} .wnav-in .bigbtn:disabled{background:#bcc9c6;}
  .wnav-in>span{flex:1;}
  /* 프리티 상세 카드 (사진 나열 + 프로필) */
  .pbig{position:relative; border:1.5px solid #e2e9e7; border-radius:16px; overflow:hidden; background:#fff; margin-bottom:11px; cursor:pointer; transition:.12s;}
  .pbig.on{border-color:#e6b800; box-shadow:0 0 0 2px #ffe7a0;}
  .pbig .strip{display:flex; gap:2px; background:#000;}
  .pbig .shot{flex:1; min-width:0; aspect-ratio:3/4; position:relative; overflow:hidden;}
  .pbig .shot img{width:100%; height:100%; object-fit:cover; display:block;}
  .pbig .shot .zoom{position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,.5); color:#fff; font-size:11px; padding:1px 6px; border-radius:10px;}
  .pbig .shot.ph{display:flex; align-items:center; justify-content:center; background:var(--teal-l); color:var(--teal); font-weight:800; font-size:30px;}
  .pbig .info{padding:11px 13px 13px;}
  .pbig .nm{font-size:16px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:7px;}
  .pbig .prof{font-size:12.5px; color:#a8810a; font-weight:800; margin-top:5px;}
  .pbig .bio{font-size:12px; color:var(--muted); margin-top:4px; line-height:1.45;}
  .pbig .extra{font-size:12px; font-weight:800; color:var(--amber); margin-top:5px;}
  .pbig .ptier{font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px;}
  .pbig .selbtn{margin-top:11px; width:100%; padding:11px; border-radius:11px; font-size:14px; font-weight:800; background:var(--teal-l); color:var(--teal); border:none; cursor:pointer;}
  .pbig.on .selbtn{background:#e6b800; color:#fff;}
  .pbig .tick{position:absolute; top:9px; right:9px; z-index:2; width:25px; height:25px; border-radius:50%; background:#e6b800; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800;}
  /* 라이트박스 */
  .lb{position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.93); display:none; align-items:center; justify-content:center;}
  .lb.on{display:flex;}
  .lb img{max-width:100%; max-height:100%; object-fit:contain;}
  .lb .lbx{position:absolute; top:14px; right:16px; background:rgba(255,255,255,.9); width:36px; height:36px; border-radius:50%; font-size:20px; border:none; line-height:1; cursor:pointer;}
  .lb .lbnav{position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; gap:9px;}
  .lb .lbnav b{width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.4);} .lb .lbnav b.on{background:#fff;}
  /* 시간 테이블 */
  .ttable{display:grid; grid-template-columns:repeat(4,1fr); gap:7px;}
  .tcell{padding:12px 0; border:1.5px solid #e2e9e7; border-radius:11px; background:#fff; font-size:14.5px; font-weight:700; color:var(--ink); cursor:pointer; font-family:inherit;}
  .tcell.on{border-color:var(--teal); background:var(--teal); color:#fff;}
  /* 예약금 입금 */
  .paywrap{max-width:480px; margin:0 auto;}
  .payhd{font-size:18px; font-weight:800; color:var(--ink); margin:4px 0 14px;}
  .depbox{display:flex; justify-content:space-between; align-items:center; background:#fff8e6; border:1px solid #ffe7a0; border-radius:13px; padding:14px 16px; margin:14px 0;}
  .depbox span{font-size:13.5px; font-weight:700; color:#9a6a00;} .depbox b{font-size:21px; color:#9a6a00;}
  .paytabs{display:flex; gap:7px; margin-bottom:11px;}
  .ptab{flex:1; padding:11px; border-radius:11px; border:1.5px solid #e2e9e7; background:#fff; font-size:13.5px; font-weight:700; color:var(--muted); font-family:inherit;}
  .ptab.on{border-color:var(--teal); background:var(--teal); color:#fff;}
  .acctbox{background:#fbfdfc; border:1px solid #eef3f1; border-radius:13px; padding:6px 14px;}
  .acctbox .ar{display:flex; justify-content:space-between; gap:12px; padding:10px 0; font-size:14px; border-bottom:1px solid #f1f4f3;}
  .acctbox .ar:last-child{border-bottom:none;} .acctbox .ar span{color:var(--muted);} .acctbox .ar b{color:var(--ink); text-align:right;}
  .acctbox .cp{cursor:pointer; color:var(--teal);}
  .qrbox{text-align:center; background:#fbfdfc; border:1px solid #eef3f1; border-radius:13px; padding:16px;}
  .qrbox img{width:200px; height:200px; object-fit:contain;} .qrcap{font-size:12.5px; color:var(--muted); margin-top:8px;}
  .paynote{font-size:12.5px; color:var(--muted); line-height:1.55; background:#fbfdfc; border:1px solid #eef3f1; border-radius:11px; padding:11px 13px; margin-top:11px;}
  .sliphd{font-size:14px; font-weight:800; color:var(--ink); margin:18px 0 9px;}
  .slipup{display:flex; align-items:center; justify-content:center; gap:6px; padding:26px; border:1.5px dashed #cdd9d6; border-radius:13px; background:#fbfdfc; color:var(--teal); font-weight:700; font-size:14.5px; cursor:pointer;}
  .slippic{position:relative; border-radius:13px; overflow:hidden; border:1px solid #eef3f1;}
  .slippic img{width:100%; display:block; max-height:360px; object-fit:contain; background:#000;}
  .slipx{position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; border:none; font-size:15px; cursor:pointer;}
  /* 워크인 패널 */
  .wk-hint{display:flex; gap:11px; align-items:flex-start; background:var(--teal-l); border:1px solid var(--teal-line); border-radius:15px; padding:15px 16px; font-size:14px; line-height:1.6; color:#15433a; font-weight:600;}
  .wk-hint .ic{font-size:21px; line-height:1.3;}
  .wk-dl{background:#fff8e6; border:1px solid #ffe7a0; border-radius:14px; padding:13px 16px; margin-top:11px;}
  .wk-dl.closed{background:#fdecea; border-color:#f6c9c2;}
  .wk-dl .big{font-size:15.5px; font-weight:800; color:#9a6a00;}
  .wk-dl.closed .big{color:var(--warm);}
  .wk-dl .sub{font-size:12.5px; color:#a8810a; margin-top:3px;}
  .wk-dl .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .wk-dl .chips span{background:#fff; border:1px solid #ffe2a0; color:#9a6a00; font-size:12.5px; font-weight:700; padding:5px 11px; border-radius:20px;}
  .wk-acc{margin-top:13px; border:1px solid #eef3f1; border-radius:15px; overflow:hidden;}
  .wk-acch{display:flex; align-items:center; gap:7px; padding:14px 15px; cursor:pointer; background:#fbfdfc; font-size:14.5px; font-weight:800; color:var(--ink);}
  .wk-acch .cnt{color:var(--teal); font-weight:800;} .wk-acch .arr{margin-left:auto; color:var(--muted); transition:.15s;}
  .wk-acch .arr.open{transform:rotate(180deg);}
  .wk-accb{padding:4px 13px 13px;}
  /* 모바일 전용 프레임 */
  .cust{max-width:430px !important; box-shadow:0 0 40px rgba(0,0,0,.05);}
  .spa-body{max-width:100% !important;}
  .wnav{background:transparent;}
  .wnav-in{max-width:430px; background:#fff; border-top:1px solid #eef3f1; box-shadow:0 -2px 12px rgba(0,0,0,.04);}
</style>
</head>
<body>
<div class="cust">
  <div class="cust-top">
    <span class="mk" id="mk"></span>
    <div><div class="t1" id="storeName">QuesMe</div><div class="t2" id="tagline"></div></div>
    <select id="langSel" class="langsel" onchange="setLang(this.value)">
      <option value="ko">한국어</option><option value="en">English</option><option value="th">ไทย</option><option value="zh">中文</option><option value="ja">日本語</option><option value="hi">हिन्दी</option><option value="ru">Русский</option>
    </select>
  </div>
  <div class="spa-body" id="body"></div>
</div>
<div class="lb" id="lb" onclick="closeLb()"><button class="lbx" onclick="closeLb()">✕</button><img alt=""><div class="lbnav" id="lbnav"></div></div>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
  var slug = new URLSearchParams(location.search).get('store') || 'pattaya-ibalso';
  var preProvider = new URLSearchParams(location.search).get('provider') || null;   // 쇼케이스에서 지명
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var lang = I18N.detectLang();
  function t(k){ return I18N.t(lang,k); }
  function tn(k,n){ return I18N.t(lang,k).replace('{n}',n); }
  var esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); };

  var store=null, providers=[], rooms=[], services=[], shifts=[], shiftIdx={}, dayBookings=[];
  var sel={ loc:'shop', svc:null, prov:null, room:null, addr:'', mode:'now', slot:null };
  var step=0, walkinOpen=true, grpOpen={pretty:true, regular:true};
  var OUTCALL_FEE = 300;
  function bkkNow(){ var d=new Date(); return new Date(d.getTime() + d.getTimezoneOffset()*60000 + 7*3600000); }   // 샵 기준 태국시각(UTC+7) — 손님 기기 시간대와 무관하게 '지금'
  function todayStr(){ var d=bkkNow(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function onShiftProviders(){
    var loc = sel.loc||'shop';
    var act = providers.filter(function(p){ return p.active!==false; });
    return act.filter(function(p){
      if(loc==='outcall' && !p.outcall_ok) return false;
      var s=shiftIdx[p.id];
      if(s && s.off) return false;             // 전일 휴무
      var av=(s&&s.avail)||'shop';             // 출근표 없으면 근무(기본 샵)
      return loc==='outcall' ? (av==='outcall'||av==='both') : (av==='shop'||av==='both');
    });
  }
  window.setLoc=function(v){ sel.loc=v; sel.prov=null; sel.room=null; render(); };
  window.setAddr=function(v){ sel.addr=v; };
  var myKey='quesme:spa:'+slug;
  function myId(){ return sessionStorage.getItem(myKey)||null; }
  function setMyId(v){ v?sessionStorage.setItem(myKey,v):sessionStorage.removeItem(myKey); }
  var myBooking=null;

  window.setLang=function(v){ lang=v; try{localStorage.setItem('quesme:lang',v);}catch(e){} render(); };

  function slots(){ var out=[],d=new Date(); d.setSeconds(0,0); var m=d.getMinutes(); d.setMinutes(m+((m<30)?(30-m):(60-m))); for(var i=0;i<8;i++){var x=new Date(d.getTime()+i*30*60000); out.push(String(x.getHours()).padStart(2,'0')+':'+String(x.getMinutes()).padStart(2,'0'));} return out; }
  function genCno(){ return 100+Math.floor(Math.random()*900); }
  function byId(arr,id){ for(var i=0;i<arr.length;i++) if(arr[i].id===id) return arr[i]; return null; }
  // ---- 가용성(빈자리) 계산: 룸+마사지사+출근+운영시간 ----
  function hm2min(s){ var p=(s||'').split(':'); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
  function min2hm(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  function nowMin(){ var d=bkkNow(); return d.getHours()*60+d.getMinutes(); }
  function overlaps(aS,aD,bS,bD){ return aS < bS+bD && bS < aS+aD; }
  function roomBusy(roomId,t,dur){ if(!roomId) return false; return dayBookings.some(function(b){ return b.room_id===roomId && b.start_time && overlaps(t,dur,hm2min(b.start_time),b.duration_min||60); }); }
  var REST=30;   // 시술 앞뒤 마사지사 휴식(분) — 예약 사이 최소 30분 간격
  function provBusy(provId,t,dur){ if(!provId) return false; return dayBookings.some(function(b){ if(b.provider_id!==provId||!b.start_time) return false; var bs=hm2min(b.start_time)-REST, bd=(b.duration_min||60)+REST*2; return overlaps(t,dur,bs,bd); }); }
  function provOnShift(provId,t,dur){   // 근무 디폴트 · 전일휴무(off) · 비근무 시간대(off_slots)
    var open=hm2min((store&&store.open_time)||'10:00'), close=hm2min((store&&store.close_time)||'22:00'); if(close<=open)close=open+12*60;
    if(t<open || t+dur>close) return false;
    var s=shiftIdx[provId]; if(!s) return true; if(s.off) return false;
    var blk=s.off_slots||[]; for(var i=0;i<blk.length;i++){ var bs=hm2min(blk[i].s), be=hm2min(blk[i].e); if(overlaps(t,dur,bs,be-bs)) return false; }
    return true;
  }
  function availableSlots(){
    var svc=byId(services,sel.svc); var dur=svc?svc.duration_min:60;
    var open=hm2min((store&&store.open_time)||'10:00'), close=hm2min((store&&store.close_time)||'22:00'); if(close<=open)close=open+12*60;
    var nm=nowMin(), act=onShiftProviders(), out=[];
    for(var ti=open; ti+dur<=close; ti+=30){
      if(ti < nm) continue;                                   // 지난 시간(오늘) 제외
      if(sel.loc!=='outcall' && roomBusy(sel.room,ti,dur)) continue;
      if(sel.prov){ if(provBusy(sel.prov,ti,dur) || !provOnShift(sel.prov,ti,dur)) continue; }
      else { if(!act.some(function(p){ return provOnShift(p.id,ti,dur) && !provBusy(p.id,ti,dur); })) continue; }
      out.push(ti);
    }
    return out;
  }
  window.setSlot=function(v){ sel.slot=v; };
  window.pickSlot=function(hm){ sel.slot=hm; render(); };
  var MIN_DUR=60;   // 마사지 최소 소요시간 1시간
  function scheduleSlots(dur){   // 선택 마사지사(또는 아무나)가 dur(분)만큼 통째로 비는 시작시각
    dur = dur || MIN_DUR;
    var open=hm2min((store&&store.open_time)||'10:00'), close=hm2min((store&&store.close_time)||'22:00'); if(close<=open)close=open+12*60;
    var nm=nowMin(), out=[];
    var provs = sel.prov ? [byId(providers,sel.prov)].filter(Boolean) : onShiftProviders();
    if(!provs.length) return out;
    for(var ti=Math.max(open, Math.ceil(nm/30)*30); ti+dur<=close; ti+=30){   // 소요시간이 운영시간 안에 들어와야
      if(provs.some(function(p){ return provOnShift(p.id,ti,dur) && !provBusy(p.id,ti,dur); })) out.push(ti);   // 마사지사가 dur만큼 근무·비어있어야
    }
    return out;
  }
  function nowSlotStart(){ var open=hm2min((store&&store.open_time)||'10:00'); return Math.max(open, Math.floor(nowMin()/30)*30); }
  function anyRoomFree(t,dur){ return rooms.filter(function(r){return r.active!==false;}).some(function(r){ return !roomBusy(r.id,t,dur); }); }
  function availNowProviders(){ var t=nowSlotStart(); return onShiftProviders().filter(function(p){ return provOnShift(p.id,t,30) && !provBusy(p.id,t,30); }); }
  function walkinSlots(){
    var dur=60, open=hm2min((store&&store.open_time)||'10:00'), close=hm2min((store&&store.close_time)||'22:00'); if(close<=open)close=open+12*60;
    var nm=nowMin(), act=onShiftProviders(), out=[];
    for(var ti=Math.max(open,Math.floor(nm/30)*30); ti+dur<=close && out.length<8; ti+=30){
      if(ti<nm) continue;
      if(!anyRoomFree(ti,dur)) continue;
      if(!act.some(function(p){ return provOnShift(p.id,ti,dur) && !provBusy(p.id,ti,dur); })) continue;
      out.push(ti);
    }
    return out;
  }

    var minDur=durs.length?Math.min.apply(null,durs):60;

    var acc='<div class="wk-acc"><div class="wk-acch" onclick="toggleWalkin()">💆 '+t('spa.availNow')+' <span class="cnt">('+now.length+')</span><span class="arr '+(walkinOpen?'open':'')+'">▾</span></div>'+

  function insertBooking(row, withPay){
    var err=document.getElementById('err');
    var fail=function(){ if(err)err.textContent='예약 실패 — 잠시 후 다시'; var bb=document.getElementById('bookBtn'); if(bb)bb.disabled=false; };
    supa.from('qsm_bookings').insert(row).then(function(res){
      if(res&&res.error){
        // 마이그레이션(qsm_deposit.sql) 전이면 deposit/pay_status 컬럼이 없어 실패 → 결제 없이 재시도
        if(withPay && /deposit|pay_status|column/i.test(res.error.message||'')){
          var r2={}; for(var k in row){ if(k!=='deposit'&&k!=='pay_status') r2[k]=row[k]; }
          return insertBooking(r2, false);
        }
        return fail();
      }
      if(!withPay){ row.pay_status='confirmed'; row.deposit=0; }
      setMyId(row.id); myBooking=row; render();
    }).catch(fail);
  }

    var whereTxt = isOut ? ('🚗 '+t('spa.locOutcall')+(b.address?' · '+esc(b.address):'')) : ('🏠 '+t('spa.locShop'));
    return '<div class="rows">'+
        '<div class="r"><span class="k">'+t('spa.lblWho')+'</span><span class="v">'+(prov?esc(prov.name)+(prov.tier==='pretty'?' ⭐':''):t('spa.anyone'))+'</span></div>'+
        '<div class="r"><span class="k">'+t('spa.lblWhen')+'</span><span class="v">'+whenTxt+'</span></div>'+
        '<div class="r"><span class="k">'+t('spa.lblSvc')+'</span><span class="v">'+(svc?esc(svc.name)+' · '+tn('spa.min',svc.duration_min):'-')+'</span></div>'+
        '<div class="r"><span class="k">'+t('spa.lblWhere')+'</span><span class="v">'+whereTxt+'</span></div>'+
        (isOut?'':'<div class="r"><span class="k">'+t('spa.lblRoom')+'</span><span class="v">'+(room?esc(room.name)+' · '+t('spa.room.'+(room.type||'private')):'-')+'</span></div>')+
        (isOut&&b.travel_fee?'<div class="r"><span class="k">'+t('spa.travelFee')+'</span><span class="v">฿'+b.travel_fee+'</span></div>':'')+
        (b.deposit?'<div class="r"><span class="k">'+t('pay.deposit')+'</span><span class="v">฿'+b.deposit+(b.pay_status==='confirmed'?' ✅':'')+'</span></div>':'')+
      '</div>';
  }
  function ticket(b){
    var serving=b.status==='serving';
    return '<div class="tk"><div class="big">'+t('spa.booked')+' 🎉</div>'+
      '<div class="nick">'+t('lbl.myNick')+' <b>'+esc(b.nick)+'</b> · '+tn('lbl.custNo',b.cno)+'</div>'+
      bookingRows(b)+
      '<div class="status '+(serving?'serving':'')+'">'+(serving?'💆 '+t('spa.statusServing'):'🔔 '+t('spa.statusWait'))+'</div>'+
      '<button class="btn gray block sm" style="margin-top:12px" onclick="cancelBooking()">'+t('spa.cancel')+'</button></div>';
  }
  // ===== 예약금 입금 + 송금 슬립 =====
  var payMethod=null, paySlip=null;
  function shopPay(){ return (store&&store.pay)||{}; }
  function payMethods(){ var p=shopPay(), o=[]; if(p.thai&&(p.thai.acc||p.thai.name))o.push('thai'); if(p.korea&&(p.korea.acc||p.korea.name))o.push('korea'); if(p.qr)o.push('qr'); return o; }
  function payDetail(m){ var p=shopPay();
    if(m==='qr') return p.qr?'<div class="qrbox"><img src="'+esc(p.qr)+'"><div class="qrcap">'+t('pay.scan')+'</div></div>':'';
    var a=p[m]||{};
    return '<div class="acctbox">'+
      (a.bank?'<div class="ar"><span>'+t('pay.bank')+'</span><b>'+esc(a.bank)+'</b></div>':'')+
      (a.acc?'<div class="ar"><span>'+t('pay.acc')+'</span><b class="cp" data-v="'+esc(a.acc)+'" onclick="copyTxt(this)">'+esc(a.acc)+' 📋</b></div>':'')+
      (a.name?'<div class="ar"><span>'+t('pay.holder')+'</span><b>'+esc(a.name)+'</b></div>':'')+
      '</div>';
  }
  window.copyTxt=function(el){ var v=el.getAttribute('data-v'); try{ navigator.clipboard.writeText(v); }catch(e){} var o=el.textContent; el.textContent=t('pay.copied'); setTimeout(function(){ el.textContent=o; },1100); };
  window.setPayMethod=function(m){ payMethod=m; render(); };
  window.addSlip=function(input){ var f=input.files&&input.files[0]; if(!f) return;
    var r=new FileReader();
    r.onerror=function(){ alert(t('pay.readErr')); input.value=''; };
    r.onload=function(){ var img=new Image();
      img.onerror=function(){ alert(t('pay.fmtErr')); input.value=''; };
      img.onload=function(){ var max=900,w=img.width,h=img.height;
        if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ paySlip=cv.toDataURL('image/jpeg',0.6); }catch(e){ alert('이미지 처리 실패'); }
        input.value=''; render();
      }; img.src=r.result; };
    r.readAsDataURL(f);
  };
  window.clearSlip=function(){ paySlip=null; render(); };
  window.submitSlip=function(){ var id=myId(); if(!id||!paySlip) return;
    var btn=document.querySelector('.paywrap .bigbtn'); if(btn){ btn.disabled=true; btn.textContent='…'; }
    var patch={ pay_slip:paySlip, pay_method:payMethod, pay_status:'submitted' };
    supa.from('qsm_bookings').update(patch).eq('id',id).then(function(res){
      if(res&&res.error){ var e=document.getElementById('err'); if(e)e.textContent=t('pay.submitErr'); if(btn){btn.disabled=false;btn.textContent=t('pay.submit');} return; }
      if(myBooking){ myBooking.pay_slip=paySlip; myBooking.pay_method=payMethod; myBooking.pay_status='submitted'; }
      render();
    }).catch(function(){ if(btn){btn.disabled=false;btn.textContent=t('pay.submit');} });
  };
  function paymentScreen(b){
    var methods=payMethods();
    if(!payMethod || methods.indexOf(payMethod)<0) payMethod=methods[0]||null;
    var tabs = methods.length>1 ? '<div class="paytabs">'+methods.map(function(m){ return '<button class="ptab '+(payMethod===m?'on':'')+'" onclick="setPayMethod(\''+m+'\')">'+t('pay.m.'+m)+'</button>'; }).join('')+'</div>' : '';
    var detail = payMethod ? payDetail(payMethod) : '<div class="meta" style="color:#9aa7a4">'+t('pay.noAcct')+'</div>';
    var note = shopPay().note ? '<div class="paynote">'+esc(shopPay().note)+'</div>' : '';
    var slip = paySlip
      ? '<div class="slippic"><img src="'+esc(paySlip)+'"><button class="slipx" onclick="clearSlip()">✕</button></div>'
      : '<label class="slipup">📷 '+t('pay.upload')+'<input type="file" accept="image/*" style="display:none" onchange="addSlip(this)"></label>';
    return '<div class="paywrap">'+
      '<div class="payhd">💳 '+t('pay.title')+'</div>'+
      bookingRows(b)+
      '<div class="depbox"><span>'+t('pay.deposit')+'</span><b>฿'+(b.deposit||0)+'</b></div>'+
      tabs+detail+note+
      '<div class="sliphd">'+t('pay.slipHd')+'</div>'+slip+
      '<button class="bigbtn" style="margin-top:14px" '+(paySlip?'':'disabled')+' onclick="submitSlip()">'+t('pay.submit')+'</button>'+
      '<div class="err" id="err"></div>'+
      '<button class="btn gray block sm" style="margin-top:8px" onclick="cancelBooking()">'+t('spa.cancel')+'</button></div>';
  }
  function pendingPay(b){
    return '<div class="tk"><div class="big">⏳ '+t('pay.waitTitle')+'</div>'+
      '<div class="nick">'+tn('lbl.custNo',b.cno)+'</div>'+
      bookingRows(b)+
      (b.pay_slip?'<div class="slippic" style="margin-top:6px"><img src="'+esc(b.pay_slip)+'"></div>':'')+
      '<div class="status">🧾 '+t('pay.waitMsg')+'</div>'+
      '<button class="btn gray block sm" style="margin-top:12px" onclick="cancelBooking()">'+t('spa.cancel')+'</button></div>';
  }

  function loadMine(){
    var id=myId(); if(!id){ myBooking=null; render(); return; }
    supa.from('qsm_bookings').select('*').eq('id',id).maybeSingle().then(function(r){
      var b=r.data;
      if(!b || b.status==='done' || b.status==='cancelled'){ setMyId(null); myBooking=null; } else { myBooking=b; }
      render();
    });
  }

  function loadAll(){
    Promise.all([
      supa.from('qsm_shops').select('*').eq('slug',slug).maybeSingle(),
      supa.from('qsm_providers').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_rooms').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_services').select('*').eq('store_slug',slug).order('sort'),
      supa.from('qsm_shifts').select('*').eq('store_slug',slug).eq('work_date',todayStr()),
      supa.from('qsm_bookings').select('provider_id,room_id,start_time,duration_min,status').eq('store_slug',slug).eq('book_date',todayStr()).neq('status','cancelled')
    ]).then(function(res){
      store=res[0].data||{slug:slug,names:{}}; providers=res[1].data||[]; rooms=res[2].data||[]; services=res[3].data||[];
      shifts=res[4].data||[]; shiftIdx={}; shifts.forEach(function(s){ shiftIdx[s.provider_id]=s; });
      dayBookings=res[5].data||[];
      if(preProvider && providers.some(function(p){return p.id===preProvider;})){ sel.prov=preProvider; sel.mode='reserve'; if(step===0) step=1; }   // 쇼케이스 지명 → 예약 흐름으로 시작

      loadMine();
    });
  }
  function loadDayBookings(){ supa.from('qsm_bookings').select('provider_id,room_id,start_time,duration_min,status').eq('store_slug',slug).eq('book_date',todayStr()).neq('status','cancelled').then(function(r){ dayBookings=r.data||[]; render(); }); }

  loadAll();
  supa.channel('quesme-spa-'+slug).on('postgres_changes',{event:'*',schema:'public',table:'qsm_bookings',filter:'store_slug=eq.'+slug},function(){ loadMine(); loadDayBookings(); }).subscribe();
})();
</script>
<script src="pwa.js"></script>
</body>
</html>
