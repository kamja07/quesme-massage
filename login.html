<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe Massage</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
<style>
  .wrap{min-height:100%; display:flex; flex-direction:column; background:var(--teal);}
  .wtop{display:flex; padding:14px 16px 0;}
  .wlang{margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:9px; padding:6px 9px; font-size:12px; font-family:inherit;}
  .wlang option{color:#16323A;}
  .wmid{flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 22px 28px; max-width:440px; margin:0 auto; width:100%;}
  .wbrand{color:#fff; font-size:34px; font-weight:800; letter-spacing:-.5px; text-align:center;}
  .wbrand small{font-size:15px; opacity:.85; font-weight:700;}
  .wtag{color:rgba(255,255,255,.95); font-size:15.5px; text-align:center; margin:8px 0 24px; line-height:1.5;}
  .wcard{background:#fff; border-radius:20px; padding:22px 20px;}
  .wcard input{width:100%; padding:14px 16px; border:1.5px solid #d7e2df; border-radius:13px; font-size:16px; font-family:inherit; color:var(--ink); margin-bottom:5px;}
  .wcard input:focus{outline:none; border-color:var(--teal);}
  .fhint{font-size:11.5px; color:#9aa7a4; margin:0 4px 11px; line-height:1.4;}
  .nstatus{min-height:18px; font-size:12.5px; font-weight:700; margin:2px 2px 10px; text-align:center;}
  .nstatus.bad{color:var(--warm);} .nstatus.dim{color:#9aa7a4;}
  .signup{display:block; text-align:center; margin-top:14px; color:var(--teal); font-size:14px; font-weight:700; text-decoration:none; cursor:pointer;}
  .owner{display:block; text-align:center; margin-top:22px; color:rgba(255,255,255,.7); font-size:12.5px; text-decoration:none; padding:8px;}
  .owner:hover{color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="wtop"><select id="lang" class="wlang" onchange="setLang(this.value)">
    <option value="ko">한국어</option><option value="en">English</option><option value="th">ไทย</option><option value="zh">中文</option><option value="ja">日本語</option><option value="hi">हिन्दी</option><option value="ru">Русский</option>
  </select></div>
  <div class="wmid">
    <div class="wbrand">QuesMe <small>Massage</small></div>
    <div class="wtag" id="tag"></div>
    <div class="wcard">
      <input id="nick" maxlength="20" autocapitalize="off" autocomplete="username" autocorrect="off">
      <div class="fhint" id="nickHint"></div>
      <input id="pw" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="fhint" id="pwHint"></div>
      <div class="nstatus dim" id="msg"></div>
      <button class="bigbtn" id="loginBtn" onclick="doLogin()"></button>
      <a class="signup" id="signupLink" onclick="doSignup()"></a>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
  var store = new URLSearchParams(location.search).get('store');
  if(store){ location.replace('book.html?store='+encodeURIComponent(store)); return; }
  location.replace('index.html'); return;   // 통합 로그인(index.html)으로 일원화
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var lang = I18N.detectLang();
  var GUEST='@guest.quesme.app';
  var RE_NICK=/^[A-Za-z]{4,}$/, RE_PW=/^(?=.*\d)[A-Za-z0-9]{6,}$/;
  function t(k){ return I18N.t(lang,k); }
  var nickEl=document.getElementById('nick'), pwEl=document.getElementById('pw'), msgEl=document.getElementById('msg');

  function chrome(){
    document.getElementById('lang').value=lang;
    document.getElementById('tag').textContent=t('cust.guide');
    nickEl.placeholder=t('cust.nickPh'); pwEl.placeholder=t('cust.pwPh');
    document.getElementById('loginBtn').textContent=t('cust.login');
    document.getElementById('signupLink').textContent=t('cust.signupQ');
    document.getElementById('nickHint').textContent=t('cust.nickRule');
    document.getElementById('pwHint').textContent=t('cust.pwRule');
  }
  window.setLang=function(v){ lang=v; try{localStorage.setItem('quesme:lang',v);}catch(e){} chrome(); msg('',''); };
  function msg(m,c){ msgEl.textContent=m||''; msgEl.className='nstatus '+(c||'dim'); }

  function validate(){
    var nick=nickEl.value.trim(), pw=pwEl.value||'';
    if(!RE_NICK.test(nick)){ msg(t('cust.nickRule'),'bad'); nickEl.focus(); return null; }
    if(!RE_PW.test(pw)){ msg(t('cust.pwRule'),'bad'); pwEl.focus(); return null; }
    return { nick:nick, email:nick.toLowerCase()+GUEST, pw:pw };
  }
  function ok(nick){ try{ localStorage.setItem('quesme:nick',nick); }catch(e){} location.href='home.html'; }

  window.doLogin=function(){
    var d=validate(); if(!d) return; msg('',''); document.getElementById('loginBtn').disabled=true;
    supa.auth.signInWithPassword({ email:d.email, password:d.pw }).then(function(r){
      document.getElementById('loginBtn').disabled=false;
      if(r&&r.error){ msg(t('cust.loginFail'),'bad'); return; }
      ok(d.nick);
    });
  };
  window.doSignup=function(){
    var d=validate(); if(!d) return; msg('','');
    supa.auth.signUp({ email:d.email, password:d.pw }).then(function(r){
      if(r&&r.error){ msg(/registered|exists|already/i.test(r.error.message||'')?t('cust.taken'):(r.error.message||'가입 실패'),'bad'); return; }
      ok(d.nick);
    });
  };

  // 이미 고객으로 로그인돼 있으면 바로 둘러보기로
  supa.auth.getSession().then(function(r){
    var s=r.data&&r.data.session; var em=(s&&s.user&&s.user.email)||'';
    if(em.indexOf(GUEST)>=0){ location.replace('home.html'); return; }
    chrome();
  });
})();
</script>
<script src="pwa.js"></script>
</body>
</html>
