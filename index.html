<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe Massage</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
<style>
  .wrap{min-height:100%; display:flex; flex-direction:column; background:var(--teal);}
  .wtop{display:flex; padding:14px 16px 0;}
  .wlang{margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:9px; padding:6px 9px; font-size:12px; font-family:inherit;}
  .wlang option{color:#16323A;}
  .wmid{flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 22px 28px; max-width:460px; margin:0 auto; width:100%;}
  .wbrand{color:#fff; font-size:36px; font-weight:800; letter-spacing:-.5px; text-align:center;}
  .wbrand small{font-size:16px; opacity:.85; font-weight:700;}
  .wtag{color:rgba(255,255,255,.92); font-size:15px; text-align:center; margin:6px 0 26px;}
  .wcard{background:#fff; border-radius:20px; padding:22px 20px;}
  .wcard label{display:block; font-size:13px; color:var(--muted); font-weight:700; margin-bottom:9px; line-height:1.4;}
  .wcard input{width:100%; padding:15px 16px; border:1.5px solid #d7e2df; border-radius:13px; font-size:18px; font-weight:700; font-family:inherit; color:var(--ink); text-align:center;}
  .wcard input:focus{outline:none; border-color:var(--teal);}
  .nstatus{min-height:18px; font-size:12.5px; font-weight:700; margin:8px 2px 0; text-align:center;}
  .nstatus.ok{color:var(--teal);} .nstatus.bad{color:var(--warm);} .nstatus.dim{color:#9aa7a4;}
  .wcard .bigbtn{margin-top:14px;} .wcard .bigbtn:disabled{background:#bcc9c6;}
  .owner{display:block; text-align:center; margin-top:22px; color:rgba(255,255,255,.78); font-size:13px; text-decoration:none; padding:8px;}
  .owner:hover{color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="wtop"><select id="lang" class="wlang" onchange="setLang(this.value)">
    <option value="ko">한국어</option><option value="en">English</option><option value="th">ไทย</option><option value="zh">中文</option><option value="ja">日本語</option><option value="hi">हिन्दी</option><option value="ru">Русский</option>
  </select></div>
  <div class="wmid">
    <div class="wbrand">QuesMe <small>Massage</small></div>
    <div class="wtag" id="tag"></div>
    <div class="wcard">
      <label id="nlabel"></label>
      <input id="nick" maxlength="12" autocapitalize="off" autocomplete="off" oninput="onNick()" onkeydown="if(event.key==='Enter')start()">
      <div class="nstatus dim" id="nstatus"></div>
      <button class="bigbtn" id="go" onclick="start()"></button>
    </div>
    <a class="owner" id="owner" href="admin.html"></a>
  </div>
</div>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
  var store = new URLSearchParams(location.search).get('store');
  if(store){ location.replace('book.html?store='+encodeURIComponent(store)); return; }
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var lang = I18N.detectLang();
  function t(k){ return I18N.t(lang,k); }
  var nickEl=document.getElementById('nick'), statusEl=document.getElementById('nstatus'), goEl=document.getElementById('go');
  var checkT=null, taken=false;

  function chrome(){
    document.getElementById('lang').value=lang;
    document.getElementById('tag').textContent=t('spa.tagline');
    document.getElementById('nlabel').textContent=t('start.nickLabel');
    nickEl.placeholder=t('start.nickPh'); goEl.textContent=t('start.go');
    document.getElementById('owner').textContent='관리자 · 매니저 · 마사지사 로그인 →';
  }
  window.setLang=function(v){ lang=v; try{localStorage.setItem('quesme:lang',v);}catch(e){} chrome(); if(nickEl.value.trim()) showStatus(); };
  function setStatus(m,c){ statusEl.textContent=m; statusEl.className='nstatus '+c; }
  function showStatus(){ setStatus(taken?t('start.taken'):t('start.available'), taken?'bad':'ok'); }
  function check(){
    var v=nickEl.value.trim().toLowerCase();
    if(!v){ taken=false; setStatus('',''); goEl.disabled=false; return; }
    return supa.from('qsm_bookings').select('nick').in('status',['waiting','serving']).then(function(res){
      var set=(res.data||[]).map(function(r){return (r.nick||'').trim().toLowerCase();});
      taken=set.indexOf(v)>=0; showStatus(); goEl.disabled=taken;
    });
  }
  window.onNick=function(){
    if(checkT) clearTimeout(checkT);
    var v=nickEl.value.trim();
    if(!v){ taken=false; setStatus('',''); goEl.disabled=false; return; }
    setStatus(t('start.checking'),'dim'); goEl.disabled=true; checkT=setTimeout(check,400);
  };
  window.start=function(){
    var v=nickEl.value.trim(); if(!v){ nickEl.focus(); return; }
    goEl.disabled=true; setStatus(t('start.checking'),'dim');
    Promise.resolve(check()).then(function(){ if(taken){ goEl.disabled=true; nickEl.focus(); return; } try{ localStorage.setItem('quesme:nick',v); }catch(e){} location.href='home.html'; });
  };
  try{ var saved=localStorage.getItem('quesme:nick'); if(saved) nickEl.value=saved; }catch(e){}
  chrome(); if(nickEl.value.trim()) onNick();
})();
</script>
<script src="pwa.js"></script>
</body>
</html>
