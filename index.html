<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<script src="inapp.js"></script>
<title>QuesMe Massage</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
<style>
  .wrap{min-height:100%; display:flex; flex-direction:column; background:var(--teal); max-width:430px; margin:0 auto; box-shadow:0 0 40px rgba(0,0,0,.06);}
  .wtop{display:flex; padding:14px 16px 0;}
  .wlang{margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:9px; padding:6px 9px; font-size:12px; font-family:inherit;}
  .wlang option{color:#16323A;}
  .wmid{flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 22px 30px; width:100%;}
  .wbrand{color:#fff; font-size:34px; font-weight:800; letter-spacing:-.5px; text-align:center;}
  .wbrand small{font-size:15px; opacity:.85; font-weight:700;}
  .wtag{color:rgba(255,255,255,.95); font-size:15px; text-align:center; margin:8px 0 22px; line-height:1.5;}
  .wcard{background:#fff; border-radius:20px; padding:22px 20px;}
  .wcard input{width:100%; padding:14px 16px; border:1.5px solid #d7e2df; border-radius:13px; font-size:16px; font-family:inherit; color:var(--ink); margin-bottom:5px;}
  .wcard input:focus{outline:none; border-color:var(--teal);}
  .fhint{font-size:11.5px; color:#9aa7a4; margin:0 4px 11px; line-height:1.4;}
  .msg{min-height:18px; font-size:12.5px; font-weight:700; margin:2px 2px 12px; text-align:center; color:#9aa7a4;}
  .msg.bad{color:var(--warm);} .msg.ok{color:var(--teal);}
  .wcard .bigbtn{margin-bottom:9px;}
  .wcard .bigbtn.alt{background:var(--teal-l); color:var(--teal);}
  .wcard .bigbtn:disabled{opacity:.6;}
  .staffnote{text-align:center; font-size:12px; color:#9aa7a4; margin-top:12px; line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="wtop"><select id="lang" class="wlang" onchange="setLang(this.value)">
    <option value="ko">한국어</option><option value="en">English</option><option value="th">ไทย</option><option value="zh">中文</option><option value="ja">日本語</option><option value="hi">हिन्दी</option><option value="ru">Русский</option>
  </select></div>
  <div class="wmid">
    <div class="wbrand">QuesMe <small>Massage</small></div>
    <div class="wtag" id="tag"></div>
    <div class="wcard">
      <input id="uid" maxlength="24" autocapitalize="off" autocomplete="username" autocorrect="off">
      <div class="fhint" id="idHint"></div>
      <input id="pw" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="fhint" id="pwHint"></div>
      <div class="msg" id="msg"></div>
      <button class="bigbtn" id="loginBtn" onclick="doLogin()"></button>
      <button class="bigbtn alt" id="signupBtn" onclick="doSignup()"></button>
      <div class="staffnote" id="staffNote"></div>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
  var supa = window.supabase.createClient(QUESME_CONFIG.url, QUESME_CONFIG.anonKey);
  var lang = I18N.detectLang();
  var STAFF='@thaimate.app', GUEST='@guest.quesme.app';
  var RE_ID=/^(?=.*[A-Za-z])[A-Za-z0-9]{6,}$/;   // 영문 포함 6자+ (고객 가입용)
  var RE_PW=/^(?=.*\d)[A-Za-z0-9]{6,}$/;          // 숫자 포함 6자+ (숫자만 or 영문+숫자)
  function t(k){ return I18N.t(lang,k); }
  var uidEl=document.getElementById('uid'), pwEl=document.getElementById('pw'), msgEl=document.getElementById('msg');
  function msg(m,c){ msgEl.textContent=m||''; msgEl.className='msg '+(c||''); }
  function idOf(){ return (uidEl.value||'').trim().toLowerCase(); }

  function chrome(){
    document.getElementById('lang').value=lang;
    document.getElementById('tag').textContent=t('auth.tag');
    uidEl.placeholder=t('auth.id'); pwEl.placeholder=t('auth.pw');
    document.getElementById('idHint').textContent=t('auth.idRule');
    document.getElementById('pwHint').textContent=t('auth.pwRule');
    document.getElementById('loginBtn').textContent=t('auth.login');
    document.getElementById('signupBtn').textContent=t('auth.signup');
    document.getElementById('staffNote').textContent=t('auth.staffNote');
  }
  window.setLang=function(v){ lang=v; try{localStorage.setItem('quesme:lang',v);}catch(e){} chrome(); msg('',''); };

  function busy(b){ document.getElementById('loginBtn').disabled=b; document.getElementById('signupBtn').disabled=b; }

  // 모든 역할 로그인: 직원/마사지사(@thaimate) 먼저 → 실패 시 고객(@guest)
  window.doLogin=function(){
    var id=idOf(), pw=pwEl.value||''; msg('','');
    if(!id||!pw){ msg(t('auth.fail'),'bad'); return; }
    busy(true);
    supa.auth.signInWithPassword({ email:id+STAFF, password:pw }).then(function(r){
      if(!(r&&r.error)) return;   // 성공 → onAuthStateChange가 라우팅
      supa.auth.signInWithPassword({ email:id+GUEST, password:pw }).then(function(r2){
        busy(false);
        if(r2&&r2.error){ msg(t('auth.fail'),'bad'); }
      });
    });
  };
  // 신규 고객: 사용가능 확인(가입 시도) → 가능하면 바로 입장
  window.doSignup=function(){
    var id=idOf(), pw=pwEl.value||''; msg('','');
    if(!RE_ID.test(id)){ msg(t('auth.idRule'),'bad'); uidEl.focus(); return; }
    if(!RE_PW.test(pw)){ msg(t('auth.pwRule'),'bad'); pwEl.focus(); return; }
    busy(true);
    supa.auth.signUp({ email:id+GUEST, password:pw }).then(function(r){
      busy(false);
      if(r&&r.error){ msg(/registered|exists|already/i.test(r.error.message||'')?t('auth.taken'):(r.error.message||'가입 실패'),'bad'); return; }
      try{ localStorage.setItem('quesme:nick',id); }catch(e){}   // 성공 → onAuthStateChange가 showcase로
    });
  };

  function route(email){
    var loginId=email.split('@')[0];
    if(email.indexOf(GUEST)>=0){ try{ localStorage.setItem('quesme:nick',loginId); }catch(e){} location.replace('showcase.html'); return; }
    supa.from('qsm_staff').select('role,store_slug').eq('email',email).then(function(r){
      var rows=r.data||[];
      var admin=rows.filter(function(x){return x.store_slug==='*';})[0];
      var mgr=rows.filter(function(x){return x.role==='manager' && x.store_slug!=='*';})[0];
      if(admin){ location.replace('admin.html'); return; }
      if(mgr){ location.replace('shop-console.html?store='+encodeURIComponent(mgr.store_slug)); return; }
      supa.from('qsm_providers').select('id').eq('login_id',loginId).limit(1).then(function(p){
        if(p.data && p.data.length){ location.replace('therapist.html'); return; }
        msg(t('auth.noperm'),'bad'); busy(false); supa.auth.signOut();
      });
    });
  }

  function updateAuth(session){
    if(session && session.user){ route(session.user.email||''); }
    else { chrome(); }
  }
  supa.auth.getSession().then(function(r){ updateAuth(r.data&&r.data.session); });
  supa.auth.onAuthStateChange(function(_e,session){ updateAuth(session); });
})();
</script>
<script src="pwa.js"></script>
</body>
</html>
